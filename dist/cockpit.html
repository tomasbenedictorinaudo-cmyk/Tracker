:root {
  /* Dark theme (default) — limited semantic palette */
  --bg: #0f1115;
  --bg-1: #161922;
  --bg-2: #1c2030;
  --bg-3: #232838;
  --line: #2a2f42;
  --line-2: #353b52;
  --text: #e7eaf3;
  --text-dim: #9aa1b8;
  --text-faint: #6b7290;
  --accent: #6ea8ff;
  --accent-2: #4d8bff;
  /* RGB triplet companion for --accent-2 — used in rgba() so styles
     that need to dial in alpha (calendar month bands, timeline hover
     marker) stay in sync with the brand button colour. */
  --accent-2-rgb: 77, 139, 255;

  --ok: #4ade80;
  --warn: #fbbf24;
  --bad: #f87171;
  --info: #7dd3fc;
  --neutral: #9aa1b8;

  --status-todo: #6b7290;
  --status-doing: #6ea8ff;
  --status-blocked: #f87171;
  --status-done: #4ade80;

  --kbd-shadow: rgba(0,0,0,.35);
  --row-stripe: rgba(255,255,255,.012);
  --hover-overlay: rgba(255,255,255,.04);
  --weekend-stripe-1: rgba(255,255,255,.025);
  --weekend-stripe-2: rgba(255,255,255,.06);
  --weekend-edge:    rgba(255,255,255,.05);

  --radius: 10px;
  --radius-sm: 7px;
  --shadow: 0 8px 24px rgba(0,0,0,.35);
  --transition: 120ms ease;
}

:root[data-theme="light"] {
  --bg:    #f4f6fb;
  --bg-1:  #ffffff;
  --bg-2:  #f1f3f9;
  --bg-3:  #e7eaf3;
  --line:  #dfe3ee;
  --line-2:#c8cfde;
  --text:      #1c2030;
  --text-dim:  #4d556d;
  --text-faint:#7a829a;
  --accent:   #2563eb;
  --accent-2: #1d4ed8;
  --accent-2-rgb: 29, 78, 216;

  --ok:   #16a34a;
  --warn: #d97706;
  --bad:  #dc2626;
  --info: #0284c7;
  --neutral: #6b7290;

  --status-todo:    #6b7290;
  --status-doing:   #2563eb;
  --status-blocked: #dc2626;
  --status-done:    #16a34a;

  --kbd-shadow: rgba(15,23,42,.10);

  --hover-overlay: rgba(15,23,42,.04);
  --weekend-stripe-1: rgba(15,23,42,.04);
  --weekend-stripe-2: rgba(15,23,42,.085);
  --weekend-edge:    rgba(15,23,42,.10);

  --shadow: 0 8px 24px rgba(15,23,42,.10);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Segoe UI", Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.45;
  overflow: hidden;
}

button { font: inherit; color: inherit; cursor: pointer; }
input, select, textarea { font: inherit; color: inherit; }

/* Layout grid
 * `minmax(0, 1fr)` lets the main column shrink below its content's intrinsic
 * min-width — without this, a wide chart / table forces the entire grid wider
 * than the viewport and the right-most column (notes panel) gets clipped on
 * full-screen layouts. The notes column itself is driven by a CSS variable so
 * it's user-resizable. */
.app {
  --notes-w: 340px;
  display: grid;
  grid-template-columns: 220px minmax(0, 1fr);
  grid-template-rows: 48px 1fr;
  grid-template-areas:
    "sidebar topbar"
    "sidebar main";
  height: 100vh;
}
.app.sidebar-collapsed { grid-template-columns: 0 minmax(0, 1fr); }
.app.sidebar-collapsed .sidebar { transform: translateX(-220px); }
.app.notes-open {
  grid-template-columns: 220px minmax(0, 1fr) var(--notes-w);
  grid-template-areas:
    "sidebar topbar notes"
    "sidebar main notes";
}
.app.sidebar-collapsed.notes-open { grid-template-columns: 0 minmax(0, 1fr) var(--notes-w); }

/* Sidebar */
.sidebar {
  grid-area: sidebar;
  background: var(--bg-1);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  transition: transform var(--transition);
  overflow: hidden;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--line);
}
.brand-mark {
  width: 22px; height: 22px;
  background: linear-gradient(135deg, var(--accent), #b389ff);
  border-radius: 5px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  flex-shrink: 0;
  box-shadow: 0 1px 0 rgba(255,255,255,.06) inset, 0 2px 6px rgba(0,0,0,.25);
}
.brand-mark svg { width: 16px; height: 16px; display: block; }
.brand-name {
  font-weight: 600;
  letter-spacing: .3px;
}
.nav { flex: 1; overflow-y: auto; padding: 10px 6px; }
.nav-section {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--text-faint);
  padding: 12px 12px 6px;
}
.nav-section-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  background: transparent;
  border: 0;
  cursor: pointer;
  font-family: inherit;
}
.nav-section-toggle:hover { color: var(--text-dim); }
.nav-section-caret {
  font-size: 9px;
  opacity: .6;
  transition: transform var(--transition);
}
.nav-section-toggle.collapsed .nav-section-caret { transform: rotate(-90deg); }
.nav-group { display: flex; flex-direction: column; }

/* Phase C — universal Cmd+K palette */
.palette-overlay {
  position: fixed;
  inset: 0;
  z-index: 1100;
  background: rgba(8, 10, 14, .55);
  backdrop-filter: blur(2px);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 12vh;
}
.palette-overlay[hidden] { display: none; }
.palette {
  width: min(640px, calc(100vw - 32px));
  max-height: 70vh;
  display: flex;
  flex-direction: column;
  background: var(--bg-1);
  border: 1px solid var(--line-2);
  border-radius: var(--radius);
  box-shadow: 0 22px 60px rgba(0,0,0,.55);
  overflow: hidden;
}
.palette-input-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  background: var(--bg-2);
}
.palette-glyph { font-size: 16px; color: var(--text-faint); }
.palette-input-row input {
  flex: 1;
  background: transparent;
  border: 0;
  outline: 0;
  color: var(--text);
  font-size: 14px;
  padding: 4px 0;
}
.palette-input-row input::placeholder { color: var(--text-faint); }
.palette-results {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 6px 4px;
}
.palette-empty {
  padding: 24px 18px;
  text-align: center;
  color: var(--text-faint);
  font-size: 12px;
}
.palette-item {
  display: grid;
  grid-template-columns: 24px 1fr auto;
  align-items: center;
  gap: 10px;
  width: 100%;
  background: transparent;
  border: 0;
  text-align: left;
  cursor: pointer;
  padding: 7px 12px;
  border-radius: 4px;
  color: var(--text);
  font-size: 13px;
  transition: background var(--transition);
}
.palette-item:hover,
.palette-item.active {
  background: var(--bg-3);
}
.palette-kind {
  width: 22px; height: 22px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-2);
  border-radius: 4px;
  font-size: 12px;
  color: var(--text-dim);
}
.palette-item.active .palette-kind { background: var(--accent); color: white; }
.palette-label {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-weight: 500;
}
.palette-hint {
  font-size: 11px;
  color: var(--text-faint);
  white-space: nowrap;
}
.palette-foot {
  display: flex;
  gap: 16px;
  padding: 8px 12px;
  border-top: 1px solid var(--line);
  background: var(--bg-2);
  font-size: 11px;
  color: var(--text-faint);
}
.palette-foot kbd {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 10px;
  background: var(--bg-3);
  border: 1px solid var(--line-2);
  border-radius: 3px;
  padding: 1px 5px;
  color: var(--text-dim);
  margin-right: 4px;
}

/* Phase B — keyboard cheatsheet */
.help-body {
  padding: 14px 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  max-height: 60vh;
  overflow-y: auto;
}
.help-section-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 6px;
}
.help-rows {
  display: grid;
  grid-template-columns: max-content 1fr;
  gap: 6px 14px;
  align-items: center;
  font-size: 12px;
}
.help-row { display: contents; }
.help-row kbd {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 11px;
  background: var(--bg-3);
  border: 1px solid var(--line-2);
  border-radius: 4px;
  padding: 2px 7px;
  color: var(--text);
  white-space: nowrap;
}
.help-row span { color: var(--text-dim); }

/* Phase D — bell + inbox */
.icon-btn-bell { position: relative; }
.icon-btn-bell > span[aria-hidden] {
  font-size: 14px; line-height: 1;
}
.bell-badge {
  position: absolute;
  top: -4px;
  right: -4px;
  min-width: 16px;
  height: 16px;
  padding: 0 4px;
  background: var(--bad);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  line-height: 16px;
  text-align: center;
  border-radius: 8px;
  border: 2px solid var(--bg-1);
  box-sizing: content-box;
  pointer-events: none;
}
.bell-badge[hidden] { display: none; }

.inbox {
  display: flex;
  flex-direction: column;
  gap: 18px;
  max-width: 880px;
}
.inbox-section-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 8px;
}
.inbox-section-count {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-faint);
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 1px 7px;
  letter-spacing: 0;
}
.inbox-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.inbox-item {
  display: grid;
  grid-template-columns: 28px 1fr auto;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background var(--transition), border-color var(--transition);
}
.inbox-item:hover { background: var(--bg-3); border-color: var(--line-2); }
.inbox-item.tone-bad   { border-left: 3px solid var(--bad); }
.inbox-item.tone-warn  { border-left: 3px solid var(--warn); }
.inbox-item.tone-muted { border-left: 3px solid var(--line-2); }
.inbox-icon {
  width: 24px; height: 24px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 14px;
  color: var(--text-dim);
  background: var(--bg-3);
  border-radius: 50%;
}
.inbox-item.tone-bad  .inbox-icon { color: var(--bad); }
.inbox-item.tone-warn .inbox-icon { color: var(--warn); }
.inbox-text { min-width: 0; }
.inbox-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.inbox-sub {
  font-size: 11px;
  color: var(--text-faint);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.inbox-dismiss {
  background: transparent;
  border: 0;
  color: var(--text-faint);
  font-size: 18px;
  line-height: 1;
  width: 22px; height: 22px;
  border-radius: 4px;
  opacity: 0;
  transition: opacity var(--transition), background var(--transition), color var(--transition);
}
.inbox-item:hover .inbox-dismiss { opacity: 1; }
.inbox-dismiss:hover { background: var(--bg-1); color: var(--text); }

/* Phase E — status report */
.report-period {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 6px 8px;
  color: var(--text);
  font-size: 12px;
}
.report-custom { display: inline-flex; align-items: center; gap: 6px; }
.report-custom input[type="date"] {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 5px 8px;
  color: var(--text);
  font-size: 12px;
}
.report-dash { color: var(--text-faint); font-size: 12px; }

.report {
  display: flex;
  flex-direction: column;
  gap: 18px;
  max-width: 900px;
}
.report-kpis {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 8px;
}
.report-kpi {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  text-align: center;
}
.report-kpi-num {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.01em;
}
.report-kpi-lbl {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--text-faint);
  margin-top: 2px;
}
.report-kpi.bad  .report-kpi-num { color: var(--bad); }
.report-kpi.warn .report-kpi-num { color: var(--warn); }

.report-section {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
}
.report-section-title {
  display: flex; align-items: center; gap: 8px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 8px;
}
.report-section-count {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-faint);
  background: var(--bg-3);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 1px 7px;
  letter-spacing: 0;
}
.report-sub-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  margin: 8px 0 4px;
}
.report-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  padding: 6px 0;
  border-top: 1px solid var(--line);
  font-size: 13px;
  color: var(--text);
}
.report-row:first-child,
.report-sub-title + .report-row { border-top: 0; }
.report-row span:first-child {
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0;
}
.report-row.clickable { cursor: pointer; }
.report-row.clickable:hover { color: var(--accent); }
.report-row.bad { color: var(--bad); }
.report-meta {
  color: var(--text-faint);
  font-size: 11px;
  white-space: nowrap;
}
.report-rationale {
  font-size: 12px;
  color: var(--text-dim);
  font-style: italic;
  padding: 2px 0 4px 14px;
  border-left: 2px solid var(--line);
  margin: 2px 0 6px 4px;
}

/* Phase F — depends-on multi-select + Gantt arrows + critical path */
.depends-input {
  display: flex; flex-direction: column; gap: 6px;
}
.depends-chips {
  display: flex; flex-wrap: wrap; gap: 5px;
  min-height: 0;
}
.dep-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 4px 3px 8px;
  background: var(--bg-3);
  border: 1px solid var(--line);
  border-radius: 999px;
  font-size: 11px;
  color: var(--text);
  max-width: 240px;
}
.dep-chip-text {
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 200px;
}
.dep-chip-x {
  background: transparent; border: 0;
  width: 16px; height: 16px; line-height: 1;
  border-radius: 999px;
  color: var(--text-faint);
  font-size: 14px;
  cursor: pointer;
}
.dep-chip-x:hover { background: var(--bg-1); color: var(--text); }

.depends-search { position: relative; }
.depends-search input {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 6px 8px;
  color: var(--text);
  font-size: 12px;
}
.depends-search input:focus { outline: none; border-color: var(--accent); }
.depends-results {
  position: absolute;
  z-index: 30;
  top: calc(100% + 2px);
  left: 0; right: 0;
  background: var(--bg-1);
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  box-shadow: 0 6px 22px rgba(0,0,0,.35);
  max-height: 220px;
  overflow-y: auto;
}
.depends-result {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
  padding: 6px 10px;
  font-size: 12px;
  color: var(--text);
  cursor: pointer;
}
.depends-result:hover { background: var(--bg-2); }
.depends-result-meta { color: var(--text-faint); font-size: 11px; }
.depends-empty { padding: 8px 10px; font-size: 12px; color: var(--text-faint); }

/* Gantt connector arrows */
.tl-dep-svg { pointer-events: none; }
.tl-dep-arrow {
  stroke: var(--text-faint);
  stroke-width: 1.5;
  opacity: .55;
  color: var(--text-faint);
}
.tl-dep-arrow.critical {
  stroke: var(--bad);
  stroke-width: 2;
  opacity: .9;
  color: var(--bad);
}
/* Critical-path bars get a faint red ring without overpainting status colors */
.tl-bar.critical-path {
  outline: 1.5px solid var(--bad);
  outline-offset: -1px;
  box-shadow: 0 0 0 2px rgba(248,113,113,.18);
}

/* Phase G — tags + comments + … overflow button */
.tag-chip {
  display: inline-flex; align-items: center;
  font-size: 10px;
  padding: 1px 7px;
  border-radius: 999px;
  font-weight: 600;
  letter-spacing: .02em;
  white-space: nowrap;
}
.tags-chips {
  display: flex; flex-wrap: wrap; gap: 5px;
  min-height: 0;
}
.tag-color-dot {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 50%;
}
.tag-result {
  display: flex; align-items: center; gap: 8px;
}
.tag-create {
  display: flex; align-items: center; gap: 8px;
  border-top: 1px solid var(--line);
}

.tag.has-comments {
  background: rgba(110, 168, 255, .12);
  color: var(--accent);
  border: 1px solid rgba(110, 168, 255, .35);
}

/* Drawer comments thread */
.comments {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.comments-list { display: flex; flex-direction: column; gap: 6px; }
.comments-empty { color: var(--text-faint); font-size: 12px; font-style: italic; }
.comment-row {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
}
.comment-head {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px;
  color: var(--text-faint);
  margin-bottom: 4px;
}
.comment-author { color: var(--text-dim); font-weight: 600; }
.comment-when { color: var(--text-faint); }
.comment-del {
  margin-left: auto;
  background: transparent; border: 0;
  color: var(--text-faint);
  font-size: 14px; line-height: 1;
  width: 18px; height: 18px;
  border-radius: 4px;
  cursor: pointer;
  opacity: 0;
  transition: opacity var(--transition), background var(--transition);
}
.comment-row:hover .comment-del { opacity: 1; }
.comment-del:hover { background: var(--bg-3); color: var(--text); }
.comment-text {
  font-size: 12.5px;
  color: var(--text);
  white-space: pre-wrap;
  line-height: 1.45;
}
.comment-compose { display: flex; gap: 8px; align-items: stretch; }
.comment-compose textarea {
  flex: 1;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  color: var(--text);
  font: inherit;
  font-size: 12.5px;
  line-height: 1.45;
  resize: vertical;
  min-height: 38px;
}
.comment-compose textarea:focus { outline: none; border-color: var(--accent); }
.comment-compose button {
  align-self: stretch;
  padding: 6px 12px;
  font-size: 12px;
}

/* Phase L — first-run tour overlay */
.tour-overlay {
  position: fixed; inset: 0;
  z-index: 800;
  pointer-events: none;
}
.tour-mask {
  position: absolute; inset: 0;
  pointer-events: auto;
  background: radial-gradient(
    circle at var(--spot-x, 50%) var(--spot-y, 50%),
    rgba(0,0,0,0)   0,
    rgba(0,0,0,0)   var(--spot-r, 0px),
    rgba(0,0,0,.55) calc(var(--spot-r, 0px) + 3px),
    rgba(0,0,0,.7)  100%
  );
  transition: background .18s ease;
}
.tour-mask.full {
  background: rgba(0,0,0,.6);
}
.tour-card {
  position: absolute;
  width: 320px;
  background: var(--bg-1);
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  box-shadow: 0 18px 48px rgba(0,0,0,.55);
  padding: 14px 16px;
  pointer-events: auto;
  z-index: 802;
}
.tour-step {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 4px;
}
.tour-title { font-size: 14px; font-weight: 700; color: var(--text); }
.tour-body {
  font-size: 12.5px;
  color: var(--text-dim);
  line-height: 1.5;
  margin: 8px 0 12px;
}
.tour-foot {
  display: flex; gap: 8px; align-items: center;
}
.tour-foot .primary { margin-left: auto; padding: 6px 12px; }
.tour-highlight {
  position: relative;
  z-index: 801;
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: 4px;
}

/* Phase K — light team-mode merge overlay */
.merge-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 700;
  display: flex; align-items: center; justify-content: center;
}
.merge-modal {
  width: 760px;
  max-width: 92vw;
  max-height: 88vh;
  background: var(--bg-1);
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  display: flex; flex-direction: column;
  box-shadow: 0 18px 48px rgba(0,0,0,.55);
}
.merge-head {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--line);
}
.merge-title { font-size: 14px; font-weight: 700; flex: 1; }
.merge-body {
  padding: 14px 16px;
  overflow-y: auto;
  flex: 1;
}
.merge-section { margin-bottom: 14px; }
.merge-section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--text-faint);
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 8px;
}
.merge-row { padding: 6px 0; }
.merge-row.muted { color: var(--text-faint); font-size: 12px; font-style: italic; }
.merge-tag {
  font-size: 9.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  padding: 1px 6px;
  border-radius: 4px;
}
.merge-tag-add      { background: rgba(52,211,153,.15); color: rgb(52,211,153); }
.merge-tag-conflict { background: rgba(248,113,113,.15); color: var(--bad); }
.merge-tag-keep     { background: var(--bg-3); color: var(--text-faint); }

.merge-block { margin: 8px 0 12px; }
.merge-block-head {
  font-size: 12px; color: var(--text-dim);
  margin-bottom: 4px;
  display: flex; align-items: center; gap: 8px;
  text-transform: capitalize;
}
.merge-conflicts { display: flex; flex-direction: column; gap: 6px; }
.merge-conflict {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
}
.merge-conflict-title {
  font-size: 12px;
  color: var(--text);
  margin-bottom: 4px;
  font-weight: 500;
}
.merge-conflict-versions {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
}
.merge-version {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: 4px;
  font-size: 11.5px;
  cursor: pointer;
}
.merge-version:hover { border-color: var(--line-2); }
.merge-version.sel { border-color: var(--accent); }
.merge-version-label { display: flex; flex-direction: column; }
.merge-version-when { font-size: 10px; color: var(--text-faint); }

.merge-choice {
  display: inline-flex; align-items: center; gap: 6px;
  margin-right: 12px;
  font-size: 12px;
}
.merge-foot {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid var(--line);
}
.merge-summary { color: var(--text-faint); font-size: 11px; flex: 1; }

/* Phase I — person dashboard (rendered into the right-side drawer) */
.dash-head {
  display: flex; gap: 14px; align-items: flex-start;
  padding: 4px 0 12px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 12px;
}
.avatar.lg {
  width: 44px; height: 44px;
  font-size: 16px; font-weight: 700;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--bg-3);
  color: var(--text);
  flex-shrink: 0;
}
.dash-head-body { flex: 1; min-width: 0; }
.dash-name { font-size: 16px; font-weight: 700; color: var(--text); }
.dash-role { font-size: 12px; color: var(--text-faint); margin-top: 2px; }
.dash-head-actions {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-top: 10px;
}
.dash-head-actions .ghost { padding: 5px 10px; font-size: 12px; }

.dash-kpis {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}
.dash-kpi {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  text-align: center;
}
.dash-kpi-num { font-size: 20px; font-weight: 700; }
.dash-kpi-lbl {
  font-size: 9.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .12em;
  color: var(--text-faint);
  margin-top: 2px;
}
.dash-kpi.bad  .dash-kpi-num { color: var(--bad); }
.dash-kpi.warn .dash-kpi-num { color: var(--warn); }

.dash-section {
  margin-bottom: 14px;
}
.dash-section-title {
  display: flex; align-items: center; gap: 8px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 6px;
}
.dash-section-count {
  font-size: 10px; font-weight: 600;
  color: var(--text-faint);
  background: var(--bg-3);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 1px 7px;
  letter-spacing: 0;
}
.dash-row {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 7px 10px;
  margin-bottom: 4px;
}
.dash-row.clickable { cursor: pointer; transition: background var(--transition), border-color var(--transition); }
.dash-row.clickable:hover { background: var(--bg-3); border-color: var(--line-2); }
.dash-row-title {
  font-size: 12.5px; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.dash-row-sub {
  font-size: 11px; color: var(--text-faint);
  margin-top: 1px;
}

/* Phase H — calendar month grid */
.calendar {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.cal-head {
  display: grid;
  grid-template-columns: 36px repeat(7, 1fr);
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-bottom: 0;
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
}
.cal-head-cell {
  padding: 6px 8px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--text-faint);
  text-align: center;
  border-right: 1px solid var(--line);
}
.cal-head-cell:last-child { border-right: 0; }
.cal-head-cell.cal-head-wk {
  background: var(--bg-3);
  color: var(--text-faint);
  letter-spacing: .04em;
}
/* Grid is now vertically scrollable to reveal more weeks. The leading
   column carries the ISO week number; each row = 1 week-number + 7
   day cells. */
.cal-grid {
  display: grid;
  grid-template-columns: 36px repeat(7, 1fr);
  grid-auto-rows: minmax(110px, 110px);
  border: 1px solid var(--line);
  border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  max-height: calc(100vh - 240px);
  overflow-y: auto;
  overflow-x: hidden;
  scroll-behavior: auto;
}
.cal-week-num {
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-2);
  color: var(--text-faint);
  font-size: 11px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  letter-spacing: -.02em;
}
.cal-day-month-tag {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--accent);
  margin-right: 4px;
}
.cal-cell {
  background: var(--bg-1);
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 4px 6px 6px;
  display: flex; flex-direction: column;
  gap: 4px;
  min-width: 0;
  position: relative;
  overflow: hidden;
}
/* 8-column grid: positions 8, 16, 24… are Sunday cells (rightmost
   day in each week). Drop their right border so it doesn't double up
   with the grid's outer border. */
.cal-cell:nth-child(8n) { border-right: 0; }
/* Alternating month bands. Odd months (Feb / Apr / Jun…) get a quiet
   tint matched to the Quick-add button colour (var(--accent-2-rgb));
   even months keep the default background. The tint is faint enough
   not to hurt readability but distinct enough not to confuse with the
   warm-white weekend wash. First-of-month inline tag ('Apr 1',
   'May 1' …) marks the precise boundary. */
.cal-cell.month-band { background: rgba(var(--accent-2-rgb), .07); }
:root[data-theme="light"] .cal-cell.month-band { background: rgba(var(--accent-2-rgb), .10); }
.cal-cell.weekend { background: rgba(255,255,255,.012); }
.cal-cell.month-band.weekend { background: rgba(var(--accent-2-rgb), .11); }
:root[data-theme="light"] .cal-cell.month-band.weekend { background: rgba(var(--accent-2-rgb), .14); }
.cal-cell.today { box-shadow: inset 0 0 0 2px var(--accent); }
.cal-cell.today .cal-day-num { color: var(--accent); font-weight: 700; }
.cal-day-num {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  text-align: right;
  line-height: 1;
  padding: 2px 2px 0;
}
.cal-chips {
  display: flex; flex-direction: column;
  gap: 2px;
  min-width: 0;
}
.cal-chip {
  display: flex; align-items: center; gap: 5px;
  background: transparent; border: 0;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 10.5px;
  color: var(--text);
  cursor: pointer;
  text-align: left;
  min-width: 0;
}
.cal-chip:hover { background: var(--bg-3); }
.cal-chip-icon {
  flex-shrink: 0;
  width: 12px;
  display: inline-block;
  text-align: center;
  font-size: 11px;
  line-height: 1;
  color: var(--text-faint);
  font-variant: normal;
}
.cal-chip-label {
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1; min-width: 0;
}
.cal-chip-accent      .cal-chip-icon { color: var(--accent); }
.cal-chip-bad         .cal-chip-icon { color: var(--bad); }
.cal-chip-good        .cal-chip-icon { color: var(--ok, #34d399); }
.cal-chip-muted       .cal-chip-icon { color: var(--text-faint); }
.cal-chip-milestone   .cal-chip-icon { color: rgb(179, 137, 255); font-weight: 700; }
.cal-chip-deliverable .cal-chip-icon { color: rgb(251, 191, 36); }
.cal-chip-meeting     .cal-chip-icon { color: rgb(20, 184, 166); }
/* Inline component tint (set via --cal-chip-tint on any chip whose
   underlying item carries a component). Two visual signals at once:
   - A 3-px left-edge stripe in the component colour — the strongest
     scannable cue when the eye sweeps a column of chips.
   - A faint full-chip background tint (≈7%) so chips with the same
     component visibly group even when the stripes don't line up.
   The chip's icon keeps its kind colour, so kind and component read
   independently. */
.cal-chip.has-tint {
  border-left: 3px solid rgb(var(--cal-chip-tint));
  padding-left: 3px;
  background: rgba(var(--cal-chip-tint), .07);
}
.cal-chip.has-tint:hover { background: rgba(var(--cal-chip-tint), .18); }
/* Keep the connected-band look intact for ranged-milestone chips even
   when they carry a component: the start day owns the stripe + rounded
   left, middle/end days drop the stripe so the row reads continuous. */
.cal-chip.has-tint.is-middle,
.cal-chip.has-tint.is-end {
  border-left: 0;
  padding-left: 6px;
}

/* Ranged-milestone visual band: chips on consecutive days share the
   same color and connect via a faint background tint, while the
   start / middle / end positions get rounded corners only on their
   outer side so a multi-day range reads as a continuous bar.
   Default colour is the milestone-violet brand hue. */
.cal-chip.kind-milestone.is-start,
.cal-chip.kind-milestone.is-middle,
.cal-chip.kind-milestone.is-end {
  background: rgba(179, 137, 255, .14);
}
.cal-chip.kind-milestone.is-start  { border-radius: 8px 0 0 8px; }
.cal-chip.kind-milestone.is-middle { border-radius: 0; }
.cal-chip.kind-milestone.is-end    { border-radius: 0 8px 8px 0; }
.cal-chip.kind-milestone.is-start:hover,
.cal-chip.kind-milestone.is-middle:hover,
.cal-chip.kind-milestone.is-end:hover {
  background: rgba(179, 137, 255, .28);
}
/* When a ranged milestone has a component, override the brand violet
   with the component tint so the connected band picks up the
   component's colour. Same specificity as the rules above; placed
   after so the cascade resolves to these for tinted chips. */
.cal-chip.has-tint.kind-milestone.is-start,
.cal-chip.has-tint.kind-milestone.is-middle,
.cal-chip.has-tint.kind-milestone.is-end {
  background: rgba(var(--cal-chip-tint), .14);
}
.cal-chip.has-tint.kind-milestone.is-start:hover,
.cal-chip.has-tint.kind-milestone.is-middle:hover,
.cal-chip.has-tint.kind-milestone.is-end:hover {
  background: rgba(var(--cal-chip-tint), .28);
}

/* Compact inline checkbox + label used in Quick Add / editor toggles */
.qa-toggle {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 12.5px;
  color: var(--text);
  cursor: pointer;
  user-select: none;
}
.qa-toggle input[type="checkbox"] {
  width: 14px; height: 14px;
  margin: 0;
  cursor: pointer;
}

/* Legend strip above the grid — clickable pills that double as
   per-kind visibility filters. 'on' state is full-saturation, 'off'
   state dims everything to ~35% so the user sees what's hidden but
   can read the title. The chip icon retains its kind colour either
   way (so the eye still maps icon → kind), but the off pill grays
   the label + adds a faint strikethrough hint via opacity. */
.cal-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 4px 4px 10px;
  font-size: 11px;
}
.cal-legend-item {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 9px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 999px;
  color: var(--text-dim);
  cursor: pointer;
  transition: opacity var(--transition), background var(--transition), border-color var(--transition), color var(--transition);
  font: inherit;
  font-size: 11px;
  line-height: 1.4;
}
.cal-legend-item.on:hover {
  background: var(--bg-3);
  border-color: var(--line-2);
  color: var(--text);
}
.cal-legend-item.off {
  opacity: .42;
  background: transparent;
}
.cal-legend-item.off:hover { opacity: .7; }
.cal-legend-item.off .cal-legend-count { color: var(--text-faint); }
.cal-legend .cal-chip-icon { width: 12px; }
.cal-legend-count {
  color: var(--text-faint);
  font-variant-numeric: tabular-nums;
  font-weight: 600;
  font-size: 10px;
  padding: 0 4px;
  background: var(--bg-3);
  border-radius: 999px;
  letter-spacing: 0;
}
.cal-more {
  background: transparent; border: 0;
  padding: 1px 6px;
  font-size: 10px;
  color: var(--text-faint);
  text-align: left;
  cursor: pointer;
  border-radius: 4px;
}
.cal-more:hover { background: var(--bg-3); color: var(--text); }

/* Calendar — Timeline format.
   A single time axis (graduated arrow, zoom-aware ticks). Range
   milestones ride the axis as 'phase' bars. Point events alternate
   above/below the axis as cards with a stem connecting back to a
   small dot on the line. No lanes — kind is conveyed by the icon
   and component tint. */
.cal-timeline {
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--bg-1);
  overflow: hidden;
}
.tl-scroll {
  overflow-x: auto;
  overflow-y: auto;
  max-height: calc(100vh - 280px);
}
.tl-stage {
  position: relative;
  margin: 0 auto;
}
.tl-axis-host {
  position: absolute;
  left: 0;
  pointer-events: none;
}
.tl-axis-svg {
  display: block;
  color: var(--text-faint);
}
.tl-axis-line {
  stroke: currentColor;
  stroke-width: 1.5;
  opacity: .9;
}
.tl-axis-arrow {
  fill: currentColor;
  opacity: .9;
}
.tl-axis-tick {
  stroke: currentColor;
  stroke-width: 1;
  opacity: .55;
}
.tl-axis-tick.major {
  stroke-width: 1.5;
  opacity: 1;
  color: var(--text-dim);
}
.tl-axis-label {
  font-size: 10px;
  fill: var(--text-faint);
  font-family: inherit;
  font-variant-numeric: tabular-nums;
}
.tl-axis-label.major {
  fill: var(--text);
  font-weight: 600;
}
.tl-today-tick {
  stroke: var(--accent);
  stroke-width: 2;
  opacity: .9;
}

/* Calendar — Table format. Sortable list of every dated item across
   a 12-month window. Same data as Calendar / Timeline; just laid out
   as rows. Row click opens the same editor as the chip elsewhere. */
.cal-table-wrap {
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--bg-1);
  overflow: hidden;
  max-height: calc(100vh - 280px);
  overflow-y: auto;
}
.cal-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.cal-table thead {
  position: sticky;
  top: 0;
  background: var(--bg-2);
  z-index: 1;
}
.cal-table th {
  text-align: left;
  padding: 8px 12px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--text-faint);
  border-bottom: 1px solid var(--line);
  white-space: nowrap;
}
.cal-table th.sortable { cursor: pointer; user-select: none; }
.cal-table th.sortable:hover { color: var(--text); }
.cal-table td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
}
.cal-tbl-row {
  cursor: pointer;
  transition: background var(--transition);
}
.cal-tbl-row:hover { background: var(--bg-2); }
.cal-tbl-row:last-child td { border-bottom: 0; }
.cal-tbl-row.has-tint td:first-child {
  border-left: 3px solid rgb(var(--cal-chip-tint));
  padding-left: 9px;
}
.cal-tbl-date {
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  font-weight: 500;
  color: var(--text);
}
.cal-tbl-date.is-today {
  color: var(--accent);
  font-weight: 700;
}
.cal-tbl-date.is-past {
  color: var(--text-faint);
}
.cal-tbl-kind {
  white-space: nowrap;
  color: var(--text-dim);
}
.cal-tbl-kind .cal-chip-icon {
  display: inline-block;
  width: 18px;
  text-align: center;
  margin-right: 6px;
  font-weight: 700;
}
.cal-tbl-kind-name { font-size: 11.5px; }
.cal-tbl-title {
  color: var(--text);
  font-weight: 500;
  max-width: 360px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.cal-tbl-sub {
  color: var(--text-faint);
  font-size: 11px;
  max-width: 360px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Zoom controls in the timeline page-head */
.tl-zoom-group {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.tl-zoom-label {
  display: inline-block;
  min-width: 44px;
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .04em;
  color: var(--text-dim);
  padding: 0 6px;
  cursor: default;
}

/* Today vertical line spans the full stage */
.tl-today-line {
  position: absolute;
  top: 0;
  width: 2px;
  background: var(--accent);
  opacity: .55;
  pointer-events: none;
  z-index: 1;
}

/* Hover indicator — follows the cursor while over the timeline,
   shows the date the cursor is pointing at. Tinted to match the
   Quick-add button colour so the readout reads as 'app accent' and
   doesn't compete with kind-coloured chips below. */
.tl-hover-marker {
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  pointer-events: none;
  z-index: 6;
}
.tl-hover-line {
  position: absolute;
  top: 0; bottom: 0; left: 0;
  width: 1px;
  background: var(--accent-2);
  opacity: .55;
}
.tl-hover-label {
  position: absolute;
  top: 4px;
  left: 4px;
  padding: 2px 8px;
  background: var(--accent-2);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .04em;
  border-radius: 3px;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
  box-shadow: 0 2px 6px rgba(0,0,0,.35);
}

/* Drag affordances: range bars expose 'ew-resize' near the edges
   (matched by the JS handle threshold) and 'grab' in the middle.
   Point markers always show 'grab'. The body cursor flips to
   'grabbing' or 'ew-resize' during an active drag. */
.tl-range-bar { cursor: grab; }
.tl-range-bar::before,
.tl-range-bar::after {
  content: '';
  position: absolute;
  top: 0;
  width: 8px;
  height: 100%;
  cursor: ew-resize;
}
.tl-range-bar::before { left: 0; }
.tl-range-bar::after  { right: 0; }
.tl-marker .tl-marker-card { cursor: grab; }
.tl-empty {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 12px;
  color: var(--text-faint);
  font-style: italic;
}

/* Range bars — phase-arrow style sitting just above the axis line */
.tl-range-bar {
  position: absolute;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 0 10px;
  background: rgba(179, 137, 255, .22);
  border: 1px solid rgba(179, 137, 255, .55);
  border-radius: 6px;
  color: var(--text);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  text-align: left;
  overflow: hidden;
  white-space: nowrap;
  transition: background var(--transition), filter var(--transition), transform var(--transition);
  z-index: 2;
}
.tl-range-bar:hover {
  filter: brightness(1.12);
  transform: translateY(-1px);
}
.tl-range-bar.has-tint {
  background: rgba(var(--cal-chip-tint), .22);
  border-color: rgba(var(--cal-chip-tint), .55);
}
.tl-range-bar.has-tint:hover { background: rgba(var(--cal-chip-tint), .35); }
.tl-range-icon { font-weight: 700; flex-shrink: 0; }
.tl-range-label { overflow: hidden; text-overflow: ellipsis; }

/* Point markers: card + stem + dot. Cards alternate above/below the
   axis. Anchored at the event's left position; the card itself sits
   centred over the anchor point. */
.tl-marker {
  position: absolute;
  background: transparent;
  border: 0;
  padding: 0;
  cursor: pointer;
  width: 0;        /* stem and dot are absolutely positioned relative
                      to this 0-width anchor; card is centred via
                      negative-half-width margin (set per zoom) */
}
.tl-marker-card {
  position: absolute;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  width: 150px;
  height: 36px;
  margin-left: -75px;   /* centre on anchor */
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--text);
  text-align: left;
  box-shadow: 0 2px 6px rgba(0,0,0,.18);
  transition: background var(--transition), border-color var(--transition), transform var(--transition), box-shadow var(--transition);
  box-sizing: border-box;
  z-index: 3;
}
.tl-marker:hover .tl-marker-card {
  background: var(--bg-3);
  border-color: var(--line-2);
  transform: translateY(-1px);
  box-shadow: 0 6px 14px rgba(0,0,0,.32);
  z-index: 5;
}
.tl-marker-icon {
  flex-shrink: 0;
  width: 18px; height: 18px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--bg-3);
  border-radius: 50%;
  font-size: 11px;
  line-height: 1;
}
.tl-marker-text {
  display: flex; flex-direction: column;
  min-width: 0; flex: 1;
  line-height: 1.15;
}
.tl-marker-label {
  font-size: 11.5px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tl-marker-date {
  font-size: 10px;
  color: var(--text-faint);
  font-variant-numeric: tabular-nums;
}
.tl-marker-stem {
  position: absolute;
  width: 1.5px;
  background: var(--text-faint);
  opacity: .55;
  margin-left: -0.75px;
  z-index: 2;
}
.tl-marker-dot {
  position: absolute;
  width: 10px; height: 10px;
  margin-left: -5px;
  border-radius: 50%;
  background: var(--bg-1);
  border: 2px solid var(--text-faint);
  box-sizing: border-box;
  z-index: 4;
}

/* Per-kind colour wash on the marker (icon background, dot border, stem) */
.tl-marker.kind-milestone   .tl-marker-icon { background: rgba(179,137,255,.20); color: rgb(179,137,255); }
.tl-marker.kind-deliverable .tl-marker-icon { background: rgba(251,191,36,.20); color: rgb(251,191,36); }
.tl-marker.kind-action      .tl-marker-icon { background: rgba(110,168,255,.20); color: var(--accent); }
.tl-marker.kind-meeting     .tl-marker-icon { background: rgba(20,184,166,.20); color: rgb(20,184,166); }
.tl-marker.kind-cr          .tl-marker-icon { background: rgba(52,211,153,.20); color: rgb(52,211,153); }

.tl-marker.kind-milestone   .tl-marker-dot { border-color: rgb(179,137,255); }
.tl-marker.kind-deliverable .tl-marker-dot { border-color: rgb(251,191,36); }
.tl-marker.kind-action      .tl-marker-dot { border-color: var(--accent); }
.tl-marker.kind-meeting     .tl-marker-dot { border-color: rgb(20,184,166); }
.tl-marker.kind-cr          .tl-marker-dot { border-color: rgb(52,211,153); }

/* Component tint overrides per-kind colours when set */
.tl-marker.has-tint .tl-marker-card {
  border-left: 3px solid rgb(var(--cal-chip-tint));
  padding-left: 7px;
}
.tl-marker.has-tint .tl-marker-icon {
  background: rgba(var(--cal-chip-tint), .20);
  color: rgb(var(--cal-chip-tint));
}
.tl-marker.has-tint .tl-marker-dot { border-color: rgb(var(--cal-chip-tint)); }
.tl-marker.has-tint .tl-marker-stem { background: rgb(var(--cal-chip-tint)); opacity: .6; }

/* … overflow button on rows / cards */
.row-overflow {
  position: absolute;
  top: 4px; right: 4px;
  width: 22px; height: 22px;
  background: transparent;
  border: 0;
  border-radius: var(--radius-sm);
  color: var(--text-faint);
  font-size: 16px;
  line-height: 1;
  cursor: pointer;
  opacity: 0;
  transition: opacity var(--transition), background var(--transition), color var(--transition);
  z-index: 2;
}
.card { position: relative; }
.card:hover .row-overflow { opacity: .7; }
.row-overflow:hover { opacity: 1 !important; background: var(--bg-3); color: var(--text); }

.nav-item {
  display: flex; align-items: center; gap: 10px;
  width: 100%;
  padding: 8px 12px;
  background: transparent;
  border: 0;
  border-radius: var(--radius-sm);
  color: var(--text-dim);
  text-align: left;
  transition: background var(--transition), color var(--transition);
}
.nav-item:hover { background: var(--bg-2); color: var(--text); }
.nav-item.active { background: var(--bg-3); color: var(--text); }
.nav-icon {
  width: 18px; text-align: center; color: var(--text-faint);
  font-size: 13px;
}
.sidebar-foot {
  display: flex; gap: 6px;
  padding: 10px;
  border-top: 1px solid var(--line);
}
.sidebar-foot button { flex: 1; }

/* Top bar */
.topbar {
  grid-area: topbar;
  display: flex; align-items: center; gap: 10px;
  padding: 0 12px;
  background: var(--bg-1);
  border-bottom: 1px solid var(--line);
}
.project-picker { display: flex; gap: 4px; align-items: center; }
.project-picker select {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 6px 26px 6px 10px;
  min-width: 180px;
  appearance: none;
  background-image: linear-gradient(45deg, transparent 50%, var(--text-faint) 50%), linear-gradient(135deg, var(--text-faint) 50%, transparent 50%);
  background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
  background-size: 5px 5px, 5px 5px;
  background-repeat: no-repeat;
}
.search { flex: 1; max-width: 360px; }
.search input {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 7px 10px;
  outline: none;
}
.search input:focus { border-color: var(--accent-2); }
.filters { display: flex; gap: 6px; }
.filters select {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 6px 22px 6px 10px;
  appearance: none;
  background-image: linear-gradient(45deg, transparent 50%, var(--text-faint) 50%), linear-gradient(135deg, var(--text-faint) 50%, transparent 50%);
  background-position: calc(100% - 12px) 50%, calc(100% - 7px) 50%;
  background-size: 5px 5px, 5px 5px;
  background-repeat: no-repeat;
}
.topbar-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }

/* Buttons */
.icon-btn {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  width: 32px; height: 30px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-dim);
  transition: background var(--transition), color var(--transition), border-color var(--transition);
}
.icon-btn:hover { background: var(--bg-3); color: var(--text); border-color: var(--line-2); }
.icon-btn.danger { color: var(--bad); opacity: .55; }
.icon-btn.danger:hover { background: rgba(248,113,113,.12); color: var(--bad); border-color: var(--bad); opacity: 1; }
/* Active-state indicator — used by Auto-backup so the toolbar shows at a
   glance whether saves are running. The button keeps its size and shape
   so the layout doesn't shift; tint + glyph turn accent-green and a
   small green dot appears in the upper-right corner. */
.icon-btn.is-active {
  position: relative;
  color: var(--ok);
  border-color: rgba(74,222,128,.4);
  background: rgba(74,222,128,.08);
}
.icon-btn.is-active:hover { background: rgba(74,222,128,.14); border-color: rgba(74,222,128,.55); }
.icon-btn.is-active::after {
  content: '';
  position: absolute;
  top: 4px; right: 4px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--ok);
  box-shadow: 0 0 0 1.5px var(--bg-2), 0 0 6px rgba(74,222,128,.6);
  animation: ab-pulse 1.8s ease-in-out infinite;
}
@keyframes ab-pulse {
  0%, 100% { opacity: 1; }
  50%      { opacity: .55; }
}

/* Small inline count pill — used on page-head buttons like 'Archive 12' */
.badge-count {
  display: inline-block;
  padding: 0 6px;
  margin-left: 4px;
  font-size: 10px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  background: var(--bg-3);
  border: 1px solid var(--line-2);
  border-radius: 999px;
  color: var(--text-faint);
  letter-spacing: 0;
}

.primary, .ghost {
  border-radius: var(--radius-sm);
  padding: 7px 12px;
  border: 1px solid var(--line);
  background: var(--bg-2);
  color: var(--text);
  transition: background var(--transition), border-color var(--transition);
}
.primary {
  background: var(--accent-2);
  border-color: var(--accent-2);
  color: white;
  font-weight: 600;
}
.primary:hover { background: var(--accent); border-color: var(--accent); }
.ghost:hover { background: var(--bg-3); border-color: var(--line-2); }

/* Main area */
.main { grid-area: main; overflow: hidden; position: relative; }
.view {
  position: absolute; inset: 0;
  overflow: auto;
  padding: 14px 16px 24px;
}

/* Page header */
.page-head {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 14px; flex-wrap: wrap;
}
.page-title { font-size: 16px; font-weight: 600; letter-spacing: .2px; }
.page-sub { color: var(--text-faint); font-size: 12px; margin-top: 2px; }
.page-actions { margin-left: auto; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

/* Kanban board */
.board {
  display: grid;
  grid-template-columns: repeat(5, minmax(180px, 1fr));
  gap: 12px;
  height: calc(100% - 30px);
}
.column {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.col-head {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
}
.col-dot {
  width: 8px; height: 8px; border-radius: 50%;
}
.col-dot.todo { background: var(--status-todo); }
.col-dot.doing { background: var(--status-doing); }
.col-dot.blocked { background: var(--status-blocked); }
.col-dot.done { background: var(--status-done); }
.col-dot.cancelled { background: rgb(107,114,128); }
.col-name { font-weight: 600; }
.col-count {
  margin-left: auto;
  background: var(--bg-3);
  color: var(--text-dim);
  border-radius: 999px;
  padding: 1px 8px;
  font-size: 11px;
}
.col-clear {
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 4px;
  color: var(--text-faint);
  cursor: pointer;
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 500;
  transition: background var(--transition), color var(--transition), border-color var(--transition);
}
.col-clear:hover {
  background: rgba(248,113,113,.1);
  color: var(--bad);
  border-color: rgba(248,113,113,.5);
}
.col-body {
  flex: 1; overflow-y: auto;
  padding: 8px;
  display: flex; flex-direction: column; gap: 8px;
}
.col-body.drop-target { background: rgba(110,168,255,.06); }

.card {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-left: 3px solid var(--neutral);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  cursor: grab;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
  -webkit-user-drag: element;
  transition: transform var(--transition), border-color var(--transition), background var(--transition);
}
.card * {
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
}
.card:active { cursor: grabbing; }
.col-body { -webkit-user-select: none; user-select: none; }
.card:hover { background: var(--bg-3); border-color: var(--line-2); }
.card.dragging { opacity: .35; }

/* Live drop placeholder — shows the exact slot where the dragged card
   will land if released right now. */
.card.drop-placeholder {
  background: rgba(110,168,255,.10) !important;
  border: 2px dashed var(--accent-2) !important;
  border-left-width: 2px !important;
  color: transparent !important;
  cursor: default;
  pointer-events: none;
  box-shadow: none !important;
  position: relative;
}
.card.drop-placeholder::after {
  content: 'drop here';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: .12em;
}
.card.drop-placeholder * {
  visibility: hidden !important;
}
.drag-ghost,
.drag-ghost * {
  pointer-events: none !important;
}
.drag-ghost { cursor: grabbing; }
body.is-card-dragging { cursor: grabbing; }
body.is-card-dragging * { cursor: grabbing !important; }
.card.doing { border-left-color: var(--accent); }
.card.ok { border-left-color: var(--ok); }
.card.soon { border-left-color: var(--warn); }
/* `late` last so it wins over `doing` — overdue should always show red */
.card.late { border-left-color: var(--bad); }
/* Cancelled — withdrawn from scope; greyed-out, strikethrough title */
.card.cancelled {
  border-left-color: rgb(107,114,128);
  opacity: .55;
}
.card.cancelled .card-title { text-decoration: line-through; }
.tl-bar.cancelled {
  background: rgba(107,114,128,.16);
  border-color: rgb(107,114,128);
  color: #cbd5e1;
  opacity: .55;
}
.tl-bar-overflow.cancelled { color: var(--text-faint); text-decoration: line-through; }

/* Component-tinted background */
.card.has-component {
  background: var(--cmp-bg);
  border-color: var(--cmp-border);
}
.card.has-component:hover { background: var(--cmp-bg-hover); }
.component-chip {
  display: inline-block;
  font-size: 10px;
  padding: 1px 7px;
  border-radius: 999px;
  margin-bottom: 6px;
  background: var(--cmp-chip-bg, rgba(255,255,255,.08));
  color: var(--cmp-chip-fg, var(--text-dim));
  font-weight: 600;
  letter-spacing: .02em;
}
.card-top-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 6px;
}
.card-top-row .component-chip { margin-bottom: 0; }
.prio-chip {
  display: inline-block;
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 1px 7px;
  border-radius: 999px;
  flex-shrink: 0;
}
.prio-chip.prio-critical {
  /* Critical priorities pulse subtly to draw the eye */
  animation: prio-pulse 1.6s ease-in-out infinite;
}
@keyframes prio-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(248,113,133,.0); }
  50%      { box-shadow: 0 0 0 3px rgba(248,113,133,.18); }
}

.card-title {
  font-weight: 500;
  margin-bottom: 6px;
  word-wrap: break-word;
}
.card-meta {
  display: flex; gap: 10px; align-items: center;
  font-size: 11px;
  color: var(--text-dim);
}
.avatar {
  width: 18px; height: 18px;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--bg-3);
  border: 1px solid var(--line-2);
  color: var(--text);
  font-size: 10px;
  font-weight: 600;
}
.due { display: inline-flex; gap: 4px; align-items: center; }
.due.late { color: var(--bad); }
.due.soon { color: var(--warn); }

.tag {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 10px;
  background: var(--bg-3);
  color: var(--text-dim);
  border: 1px solid var(--line);
}

/* Component editor */
.component-swatch {
  display: inline-block;
  width: 14px; height: 14px;
  border-radius: 4px;
  border: 1px solid var(--line-2);
  flex-shrink: 0;
}
.component-swatch-btn {
  cursor: pointer;
  transition: transform .12s ease, box-shadow .12s ease;
  padding: 0;
  appearance: none;
}
.component-swatch-btn:hover {
  transform: scale(1.15);
  box-shadow: 0 0 0 2px var(--bg-1), 0 0 0 3px var(--accent);
}
.component-swatch-btn:focus-visible {
  outline: none;
  box-shadow: 0 0 0 2px var(--bg-1), 0 0 0 3px var(--accent);
}

/* Floating popover used by the Components panel to change a
   component's colour without scrolling through the dropdown. */
.comp-color-pop {
  background: var(--bg-1);
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  padding: 8px;
  box-shadow: 0 8px 28px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.04) inset;
  z-index: 9500;
  display: grid;
  grid-template-columns: repeat(6, 22px);
  gap: 6px;
}
.comp-color-pick {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  padding: 0;
  appearance: none;
  transition: transform .12s ease, border-color .12s ease;
}
.comp-color-pick:hover  { transform: scale(1.12); }
.comp-color-pick.is-active {
  border-color: var(--text);
  box-shadow: 0 0 0 2px var(--bg-1) inset;
}
/* Component name takes a fixed slot; the description grows to fill
   whatever remains so the row reads like "<swatch> Name | Description"
   without forcing a second line. */
.row .component-name { flex: 0 0 180px; min-width: 0; }
.row.component-row .component-desc {
  flex: 1 1 auto;
  min-width: 0;
  background: var(--bg-3);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 2px 8px;
  font-size: 11.5px;
  color: var(--text-dim);
  font-style: italic;
}
.row.component-row .component-desc:focus {
  border-color: var(--accent-2);
  background: var(--bg-2);
  color: var(--text);
  font-style: normal;
}
.row.component-row .component-desc::placeholder { color: var(--text-faint); }

/* Inline component chip on decision rows (mirrors the action chip). */
.row .row-comp {
  font-size: 10.5px;
  padding: 1px 7px;
  border-radius: 999px;
  white-space: nowrap;
  flex-shrink: 0;
}
.color-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.color-swatch {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
}
.color-swatch:hover { background: var(--bg-3); }
.color-swatch input { display: none; }
.color-swatch span {
  display: inline-block; width: 14px; height: 14px;
  border-radius: 4px;
  border: 1px solid rgba(255,255,255,.15);
}
.color-swatch em { font-style: normal; font-size: 12px; color: var(--text-dim); }
.color-swatch:has(input:checked) {
  border-color: var(--accent-2);
  background: var(--bg-3);
}
.color-swatch:has(input:checked) em { color: var(--text); }

/* Board quick-action drop zones (visible while dragging a card) */
.board-quick-actions {
  display: none;
  position: fixed;
  /* Sit on top of the viewport edges so the pills are always reachable
     even when the board scrolls past the visible area. */
  top: 60px;
  left: 240px;
  right: 16px;
  bottom: 20px;
  pointer-events: none; /* Only .bqa-zone pills capture events */
  z-index: 50;
}
.app.sidebar-collapsed .board-quick-actions { left: 16px; }
.app.notes-open .board-quick-actions { right: 416px; }
.board-view.dragging-active .board-quick-actions { display: block; }
.bqa-zone {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 28px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  background: var(--bg-1);
  border: 2px dashed var(--line-2);
  color: var(--text-dim);
  user-select: none;
  /* Off by default — only becomes interactive while a card is dragging,
     otherwise the invisible pills intercept mousedown on cards. */
  pointer-events: none;
  transition: background var(--transition), color var(--transition), border-color var(--transition), transform 100ms ease;
  box-shadow: var(--shadow);
}
.board-view.dragging-active .bqa-zone { pointer-events: auto; }
.bqa-zone .bqa-icon { font-size: 18px; }
.bqa-zone.bqa-done {
  top: 4px;
  border-color: rgba(74,222,128,.55);
  color: var(--ok);
}
.bqa-zone.bqa-delete {
  bottom: 4px;
  border-color: rgba(248,113,113,.55);
  color: var(--bad);
}
.bqa-zone.over {
  border-style: solid;
  transform: translateX(-50%) scale(1.06);
}
.bqa-zone.bqa-done.over   { background: rgba(74,222,128,.18); color: var(--ok); }
.bqa-zone.bqa-delete.over { background: rgba(248,113,113,.18); color: var(--bad); }

/* Archive page rows: re-use .reg-* but adjust grid to 7 columns */
.archive-row {
  grid-template-columns: 2.4fr 1.2fr 1.4fr .8fr .9fr auto auto !important;
}
.archive-row .archive-restore {
  font-size: 11px;
  padding: 3px 9px;
}

/* Empty state */
.empty {
  padding: 30px;
  text-align: center;
  color: var(--text-faint);
  font-size: 12px;
}

/* Timeline */
.timeline {
  display: grid;
  grid-template-columns: 180px 1fr;
  height: calc(100% - 30px);
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
}
.tl-lanes {
  border-right: 1px solid var(--line);
  overflow-y: auto;
}
.tl-lane {
  height: 36px;
  display: flex; align-items: center;
  padding: 0 12px;
  border-bottom: 1px solid var(--line);
  font-size: 12px;
  color: var(--text-dim);
}
.tl-lane.header { background: var(--bg-2); height: 36px; color: var(--text-faint); font-size: 11px; text-transform: uppercase; letter-spacing: .12em; }
.tl-grid-wrap { position: relative; overflow: auto; }
.tl-axis {
  position: sticky; top: 0;
  background: var(--bg-2);
  border-bottom: 1px solid var(--line);
  height: 36px;
  z-index: 2;
}
.tl-axis-tick {
  position: absolute; top: 0; bottom: 0;
  width: 1px; background: var(--line);
  opacity: .5;
}
.tl-axis-tick.major { background: var(--line-2); opacity: 1; }
.tl-axis-label {
  position: absolute; top: 4px;
  font-size: 10px;
  color: var(--text-faint);
  transform: translateX(4px);
  white-space: nowrap;
  display: flex; flex-direction: column; line-height: 1.15;
}
.tl-axis-label b { color: var(--text-dim); font-weight: 600; }
.tl-axis-label span { font-size: 9px; opacity: .7; }
.tl-grid {
  position: relative;
}
.tl-gridlines {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 0;
}
.tl-gridlines .tl-axis-label { display: none; }
.tl-grid-row {
  height: 36px;
  border-bottom: 1px solid var(--line);
  position: relative;
}
.tl-grid-row:nth-child(even) { background: var(--row-stripe); }
.tl-today {
  position: absolute; top: 0; bottom: 0;
  width: 1px; background: var(--accent);
  z-index: 3;
  pointer-events: none;
}
.tl-today::after {
  content: 'today';
  position: absolute; top: 4px; left: 4px;
  font-size: 10px; color: var(--accent);
  background: var(--bg-1); padding: 1px 4px; border-radius: 3px;
}
.tl-bar {
  position: absolute;
  top: 8px; height: 18px;
  background: var(--bg-3);
  border: 1px solid var(--line-2);
  border-radius: 4px;
  cursor: grab;
  display: flex; align-items: center;
  padding: 0 6px;
  font-size: 11px;
  color: var(--text);
  white-space: nowrap; overflow: hidden;
  user-select: none;
  z-index: 1;
}
.tl-bar.late { background: rgba(248,113,113,.18); border-color: var(--bad); color: #fecaca; }
.tl-bar.doing { background: rgba(110,168,255,.18); border-color: var(--accent); color: #cfe1ff; }
.tl-bar.done { background: rgba(74,222,128,.16); border-color: var(--ok); color: #c8f7d9; opacity: .8; }
.tl-bar.blocked { background: rgba(248,113,113,.12); border-color: var(--bad); color: #fecaca; }
.tl-bar.dragging { opacity: .85; cursor: grabbing; box-shadow: 0 4px 14px rgba(0,0,0,.45); }
.tl-bar .bar-label {
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis;
  pointer-events: none;
  padding: 0 2px;
}
.tl-bar .resize-handle {
  position: absolute; top: 0; bottom: 0; width: 8px;
  cursor: ew-resize;
  z-index: 2;
  display: flex; align-items: center; justify-content: center;
  transition: background var(--transition);
}
.tl-bar .resize-handle::before {
  content: ''; width: 2px; height: 60%;
  background: rgba(255,255,255,0);
  border-radius: 1px;
  transition: background var(--transition);
}
.tl-bar:hover .resize-handle::before { background: rgba(255,255,255,.4); }
.tl-bar .resize-handle:hover { background: rgba(255,255,255,.18); }
.tl-bar .resize-handle:hover::before { background: rgba(255,255,255,.85); }
.tl-bar .resize-handle.left { left: 0; border-top-left-radius: 4px; border-bottom-left-radius: 4px; }
.tl-bar .resize-handle.right { right: 0; border-top-right-radius: 4px; border-bottom-right-radius: 4px; }

/* Unified events strip at the bottom of the Gantt grid */
.tl-event-line {
  position: absolute; top: 0; bottom: 0;
  width: 1px;
  z-index: 1;
  pointer-events: none;
}
.tl-event-line.tl-evt-milestone {
  background: rgba(179,137,255,.65);
}
.tl-event-line.tl-evt-deliverable {
  background: rgba(125,211,252,.55);
}
.tl-event-line.tl-evt-meeting {
  background: rgba(251,191,36,.6);
}
.tl-event-line.tl-evt-meeting-weekly {
  background-image: linear-gradient(to bottom, rgba(251,191,36,.35) 50%, transparent 50%);
  background-size: 1px 4px;
  background-color: transparent;
}
.tl-events-row {
  position: relative;
  height: 78px;
  border-top: 1px solid var(--line-2);
  background: var(--bg-2);
  width: 100%;
}
.tl-event-mark {
  position: absolute;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--bg-1);
  border: 1px solid var(--line-2);
  font-size: 10px;
  white-space: nowrap;
  z-index: 2;
  cursor: default;
  transform: translateX(-50%);
  user-select: none;
}
.tl-event-mark .evt-icon { font-size: 11px; line-height: 1; }
.tl-event-mark.slot-0 { top: 6px; }
.tl-event-mark.slot-1 { top: 28px; }
.tl-event-mark.slot-2 { top: 50px; }
.tl-event-mark.tl-evt-milestone {
  border-color: rgba(179,137,255,.55);
  color: #d8c1ff;
  background: rgba(179,137,255,.08);
}
.tl-event-mark.tl-evt-deliverable {
  border-color: rgba(125,211,252,.55);
  color: #cfe1ff;
  background: rgba(125,211,252,.08);
}
.tl-event-mark.tl-evt-meeting {
  border-color: rgba(251,191,36,.55);
  color: #fde68a;
  background: rgba(251,191,36,.08);
}
.tl-event-mark.tl-evt-meeting-weekly {
  border-style: dashed;
  border-color: rgba(251,191,36,.45);
  color: #fde68a;
  background: rgba(251,191,36,.04);
}

:root[data-theme="light"] .tl-event-mark.tl-evt-milestone   { color: #6b21a8; }
:root[data-theme="light"] .tl-event-mark.tl-evt-deliverable { color: #075985; }
:root[data-theme="light"] .tl-event-mark.tl-evt-meeting,
:root[data-theme="light"] .tl-event-mark.tl-evt-meeting-weekly { color: #92400e; }

.tl-tooltip {
  position: absolute;
  background: var(--bg-3);
  border: 1px solid var(--line-2);
  color: var(--text);
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  font-size: 11px;
  line-height: 1.4;
  pointer-events: none;
  box-shadow: var(--shadow);
  z-index: 5;
  white-space: nowrap;
}

/* Holiday bands on Gantt */
.tl-holiday-band {
  position: absolute; top: 0; bottom: 0;
  background: repeating-linear-gradient(
    -45deg,
    rgba(251,191,36,.10),
    rgba(251,191,36,.10) 4px,
    rgba(251,191,36,.18) 4px,
    rgba(251,191,36,.18) 8px
  );
  border-left: 1px solid rgba(251,191,36,.35);
  border-right: 1px solid rgba(251,191,36,.35);
  z-index: 0;
  pointer-events: auto;
}
.tl-holiday-tag {
  position: absolute; top: 2px; left: 2px;
  font-size: 10px;
  pointer-events: none;
}
.tl-holiday-band.weekend {
  background: repeating-linear-gradient(
    -45deg,
    var(--weekend-stripe-1),
    var(--weekend-stripe-1) 4px,
    var(--weekend-stripe-2) 4px,
    var(--weekend-stripe-2) 8px
  );
  border-left: 1px solid var(--weekend-edge);
  border-right: 1px solid var(--weekend-edge);
}

.tl-bar.holiday-conflict {
  outline: 1px dashed rgba(251,191,36,.7);
  outline-offset: 1px;
}
.tl-bar.over-allocated {
  box-shadow: inset 0 0 0 1px rgba(248,113,113,.85), 0 0 6px rgba(248,113,113,.35);
}
.tl-bar .bar-warn { color: var(--warn); margin-right: 2px; }
.tl-bar .bar-warn.over { color: var(--bad); }
.tl-bar .bar-pct {
  font-size: 9px;
  background: rgba(255,255,255,.15);
  border-radius: 3px;
  padding: 0 4px;
  font-weight: 600;
}

/* Per-owner over-allocation bands on the timeline */
.tl-overload {
  position: absolute; top: 0; bottom: 0;
  z-index: 0;
  pointer-events: auto;
  border-left: 1px solid rgba(248,113,113,.45);
  border-right: 1px solid rgba(248,113,113,.45);
}

/* Popover (anchored under a button) */
.popover-anchor { position: relative; display: inline-block; }
.popover {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  min-width: 280px;
  background: var(--bg-1);
  border: 1px solid var(--line-2);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  z-index: 50;
  padding: 10px;
  display: flex; flex-direction: column;
}
.popover[hidden] { display: none; }
.popover-head { font-weight: 600; padding: 4px 4px 2px; }
.popover-sub { font-size: 11px; color: var(--text-faint); padding: 0 4px 8px; }
.popover-list { display: flex; flex-direction: column; gap: 2px; max-height: 360px; overflow-y: auto; }
.popover-divider {
  height: 1px;
  background: var(--line);
  margin: 6px 4px;
}
.popover-item {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 8px;
  border-radius: var(--radius-sm);
  cursor: pointer;
}
.popover-item:hover { background: var(--bg-2); }
.popover-item .flag { font-size: 16px; }
.popover-item .muted { margin-left: auto; color: var(--text-faint); font-size: 11px; }
.popover-foot {
  display: flex; justify-content: space-between; gap: 6px;
  padding-top: 8px;
  margin-top: 8px;
  border-top: 1px solid var(--line);
}

.badge {
  display: inline-block;
  background: var(--accent-2);
  color: white;
  border-radius: 999px;
  padding: 0 6px;
  font-size: 10px;
  font-weight: 600;
  margin-left: 4px;
  min-width: 16px;
  text-align: center;
}

/* Segmented control */
.seg {
  display: inline-flex;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 2px;
  gap: 0;
}
.seg-btn {
  background: transparent;
  border: 0;
  border-radius: 5px;
  padding: 5px 10px;
  font-size: 12px;
  color: var(--text-dim);
  transition: background var(--transition), color var(--transition);
}
.seg-btn:hover { color: var(--text); }
.seg-btn.active {
  background: var(--bg-3);
  color: var(--text);
  box-shadow: 0 1px 0 rgba(255,255,255,.04);
}

/* Dashboard */
.dashboard {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: auto;
  gap: 12px;
}

/* Decision-making KPI strip — sits above the regular dashboard */
.dkpi-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  margin-bottom: 14px;
}
@media (max-width: 1100px) {
  .dkpi-grid { grid-template-columns: repeat(2, 1fr); }
}
.dkpi {
  position: relative;
  background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-height: 140px;
  overflow: hidden;
}
.dkpi::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(900px 60px at 0% 0%, rgba(110,168,255,.08), transparent 70%);
}
.dkpi-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text-faint);
}
.dkpi-num {
  font-size: 28px;
  font-weight: 700;
  line-height: 1.1;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
.dkpi-num.ok   { color: var(--ok); }
.dkpi-num.warn { color: var(--warn); }
.dkpi-num.bad  { color: var(--bad); }
.dkpi-sub {
  font-size: 11px;
  color: var(--text-dim);
}

/* Mini bars for utilisation card */
.dkpi-mini { display: flex; flex-direction: column; gap: 3px; margin-top: 6px; }
.dkpi-mb {
  display: grid;
  grid-template-columns: 32px 1fr 36px;
  align-items: center;
  gap: 6px;
  font-size: 10.5px;
  color: var(--text-faint);
  font-variant-numeric: tabular-nums;
}
.dkpi-mb-lbl { color: var(--text-faint); }
.dkpi-mb-val { color: var(--text-dim); text-align: right; font-weight: 600; }
.dkpi-mb-track {
  background: var(--bg-3);
  border-radius: 999px;
  height: 5px;
  overflow: hidden;
}
.dkpi-mb-fill {
  display: block;
  height: 100%;
  border-radius: 999px;
  transition: width var(--transition);
  background: var(--accent);
}
.dkpi-mb-fill.ok   { background: var(--ok); }
.dkpi-mb-fill.warn { background: var(--warn); }
.dkpi-mb-fill.bad  { background: var(--bad); }

/* Inline strip with pills (risk + CR cards) */
.dkpi-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: auto;
  font-size: 10.5px;
}
.dkpi-strip > span {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 999px;
  background: var(--bg-3);
  color: var(--text-dim);
  font-weight: 500;
}
.dkpi-strip-pill { color: var(--text-dim); }
.dkpi-strip-ok    { color: var(--ok);   background: rgba(74,222,128,.12); }
.dkpi-strip-warn  { color: var(--bad);  background: rgba(248,113,133,.14); font-weight: 600; }
.dkpi-strip-muted { color: var(--text-faint); }

/* Stale list */
.dkpi-list {
  display: flex;
  flex-direction: column;
  gap: 1px;
  margin-top: auto;
}
.dkpi-list-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 3px 6px;
  border-radius: 4px;
  font-size: 11px;
  color: var(--text-dim);
}
.dkpi-list-row.clickable { cursor: pointer; }
.dkpi-list-row.clickable:hover { background: var(--bg-3); color: var(--text); }
.dkpi-list-text {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.dkpi-list-meta {
  font-variant-numeric: tabular-nums;
  font-weight: 600;
  color: var(--bad);
}
.dkpi-list-empty {
  font-size: 11px;
  color: var(--text-faint);
  padding: 4px 6px;
  font-style: italic;
}

/* Dual-number cell (CPI / SPI) */
.dkpi-dual {
  display: flex;
  align-items: stretch;
  gap: 4px;
  margin-top: 2px;
}
.dkpi-dual-cell {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.dkpi-dual-num {
  font-size: 24px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
  color: var(--text);
}
.dkpi-dual-num.ok   { color: var(--ok); }
.dkpi-dual-num.warn { color: var(--warn); }
.dkpi-dual-num.bad  { color: var(--bad); }
.dkpi-dual-lbl {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-top: 2px;
}
.dkpi-dual-sep {
  width: 1px;
  background: var(--line);
}
.kpi {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px;
}
.kpi-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: .12em;
  color: var(--text-faint);
}
.kpi-value {
  font-size: 28px; font-weight: 600;
  margin-top: 6px;
}
.kpi-value.ok { color: var(--ok); }
.kpi-value.warn { color: var(--warn); }
.kpi-value.bad { color: var(--bad); }
.kpi-sub {
  margin-top: 4px; font-size: 11px; color: var(--text-dim);
}

.panel {
  grid-column: span 4;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px;
}
.panel.half { grid-column: span 2; }
.panel-title {
  font-weight: 600; margin-bottom: 10px;
  display: flex; justify-content: space-between; align-items: center;
}

.bar-row {
  display: grid;
  grid-template-columns: 110px 1fr 40px;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
  font-size: 12px;
}
.bar-row.wide-name { grid-template-columns: 240px 1fr 50px; }
.bar-row .name-cell, .person-row .name-cell { display: flex; align-items: center; gap: 8px; min-width: 0; }
.bar-row .name-cell .who, .person-row .name-cell .who { display: flex; flex-direction: column; min-width: 0; }
.bar-row .name-cell .who b, .person-row .name-cell .who b { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-row .name-cell .who span, .person-row .name-cell .who span { color: var(--text-faint); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* People — workload row with sparkline */
.person-row {
  display: grid;
  grid-template-columns: 220px 200px 1fr;
  align-items: center;
  gap: 16px;
  padding: 10px 0;
  border-top: 1px solid var(--line);
  font-size: 12px;
}
.person-row:first-child { border-top: 0; }
.now-load { display: grid; grid-template-columns: 1fr 50px; gap: 8px; align-items: center; }
.spark-wrap { display: flex; align-items: center; gap: 12px; }
.spark { width: 100%; max-width: 540px; height: 70px; flex: 1; }
.spark-bar { fill: var(--ok); transition: opacity var(--transition); }
.spark-bar.warn { fill: var(--warn); }
.spark-bar.over { fill: var(--bad); }
.spark-bar:hover { opacity: .85; }
.spark-cap { stroke: var(--text-faint); stroke-width: 1; opacity: .55; }
.spark-cap-label { fill: var(--text-faint); font-size: 9px; }
.spark-tick { fill: var(--text-faint); font-size: 9px; }
.spark-meta { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
.spark-meta .ok { color: var(--ok); }
.spark-meta .warn { color: var(--warn); }
.spark-meta .over { color: var(--bad); }

/* Charts grid (also used as the Charts section of the Dashboard) */
.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.chart-panel { grid-column: span 2; }
.chart-panel.half { grid-column: span 1; }

/* Section break used inside the merged Dashboard view to introduce
   the Charts block under the Dashboard block. Visually a quiet
   horizontal rule + a section title — not a new page header. */
.dashboard-section-break {
  margin: 22px 0 10px;
  padding-top: 14px;
  border-top: 1px solid var(--line);
}
.dashboard-section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: .2px;
}
.dashboard-section-sub {
  font-size: 11px;
  color: var(--text-faint);
  margin-top: 2px;
}
.chart-svg { width: 100%; max-height: 380px; display: block; }
.chart-foot {
  margin-top: 6px;
  font-size: 11px;
  color: var(--text-faint);
}
.chart-cap { stroke: var(--text-faint); stroke-width: 1; opacity: .5; stroke-dasharray: 4 3; }
.cumwl-minor { stroke: var(--line); stroke-width: 0.5; opacity: .35; }
.chart-label { fill: var(--text-faint); font-size: 10px; }
.chart-axis-label { fill: var(--text-faint); font-size: 10px; font-style: italic; }
.chart-tick { fill: var(--text-faint); font-size: 9px; }
.chart-grid { stroke: var(--line); stroke-width: .6; opacity: .55; }
.chart-diag { stroke: var(--accent); stroke-width: 1.4; stroke-dasharray: 6 4; opacity: .8; }
.chart-today { stroke: var(--accent); stroke-width: 1; opacity: .7; }
.bar-done { fill: var(--ok); }
.bar-slip { fill: var(--bad); opacity: .9; }
.line-created { fill: none; stroke: var(--accent); stroke-width: 1.5; opacity: .9; }
.dot-created { fill: var(--accent); }
.chart-foot b.ok { color: var(--ok); }
.chart-foot b.bad { color: var(--bad); }
.chart-foot b.warn { color: var(--warn); }
.chart-foot-snap { display: inline-block; margin-left: 8px; padding-left: 8px; border-left: 1px solid var(--line); }

/* Interactive legend (cumulative workload) */
.chart-legend .legend-item {
  background: transparent; border: 0; padding: 0;
  font-size: 11px; color: var(--text-dim);
  cursor: pointer;
  transition: color var(--transition), opacity var(--transition);
}
.chart-legend .legend-item:hover { color: var(--text); }
.chart-legend .legend-item.is-hidden { color: var(--text-faint); text-decoration: line-through; }
.chart-legend .legend-item.is-hidden .dot { opacity: .35; }

/* Register */
.reg-kpis {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
  margin-bottom: 14px;
}
.reg-kpi {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0;
}
.reg-kpi.grow { grid-column: span 2; }
.reg-kpi.clickable {
  cursor: pointer;
  transition: border-color var(--transition), transform 80ms ease, background var(--transition);
  user-select: none;
}
.reg-kpi.clickable:hover {
  border-color: var(--accent-2);
  transform: translateY(-1px);
}
.cmp-leg-item.clickable, .donut-slice.clickable, .kpi-stack .seg.clickable {
  cursor: pointer;
}
.cmp-leg-item.clickable:hover { color: var(--text); }
