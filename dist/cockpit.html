/* Active-filter highlight — applied to whichever KPI / legend chip
   matches the topbar filter so the user knows what's currently on
   and that re-clicking will toggle it off. */
.reg-kpi.is-active-filter {
  border-color: var(--accent);
  background: rgba(110, 168, 255, .07);
  box-shadow: inset 0 0 0 1px var(--accent);
}
.cmp-leg-item.is-active-filter,
.kpi-stack .seg.is-active-filter {
  background: rgba(110, 168, 255, .14);
  color: var(--accent);
  border-radius: 4px;
  padding: 2px 6px;
  margin: -2px -2px;
  font-weight: 700;
}
.donut-slice { cursor: pointer; transition: stroke-width var(--transition); }
.donut-slice:hover { stroke-width: 11; }
.kpi-stack .seg.clickable:hover { opacity: .7; }
.kpi-sub.clickable-inline {
  cursor: pointer;
  border-bottom: 1px dashed transparent;
  display: inline-block;
}
.kpi-sub.clickable-inline:hover {
  color: var(--text);
  border-bottom-color: var(--text-faint);
}

/* Dashboard clickable KPIs */
.kpi.clickable {
  cursor: pointer;
  transition: border-color var(--transition), transform 80ms ease;
  user-select: none;
}
.kpi.clickable:hover {
  border-color: var(--accent-2);
  transform: translateY(-1px);
}

/* People row clickable */
.person-row.clickable { cursor: pointer; user-select: none; }
.person-row.clickable:hover { background: var(--bg-2); }
.reg-kpi .kpi-num {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -.01em;
  line-height: 1.1;
}
.reg-kpi .kpi-num.bad { color: var(--bad); }
.reg-kpi .kpi-num.warn { color: var(--warn); }
.reg-kpi .kpi-num.ok { color: var(--ok); }
.reg-kpi .kpi-lbl {
  font-size: 10px;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: .1em;
}
.reg-kpi .kpi-sub {
  font-size: 11px;
  color: var(--text-dim);
}
.reg-kpi.donut-kpi { flex-direction: row; align-items: center; gap: 12px; }
.reg-kpi .kpi-donut { width: 64px; height: 64px; flex-shrink: 0; }
.reg-kpi .kpi-donut-num { font-size: 14px; font-weight: 700; fill: var(--text); }
.reg-kpi .kpi-donut-legend { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.reg-kpi .kpi-spark { width: 100%; height: 32px; }
.reg-kpi .kpi-linechart { width: 100%; height: 56px; display: block; }
.kpi-linechart .lc-baseline { stroke: var(--line); stroke-width: 1; opacity: .6; }
.kpi-linechart .lc-opened {
  fill: none;
  stroke: var(--accent);
  stroke-width: 1.5;
  stroke-linejoin: round;
  stroke-linecap: round;
}
.kpi-linechart .lc-closed {
  fill: none;
  stroke: var(--ok);
  stroke-width: 1.5;
  stroke-linejoin: round;
  stroke-linecap: round;
}
.kpi-linechart .lc-today {
  stroke: var(--text-faint);
  stroke-width: 1;
  stroke-dasharray: 2 2;
  opacity: .5;
}
.kpi-linechart .lc-open-area {
  fill: rgba(154,161,184,.16);
  stroke: rgba(154,161,184,.5);
  stroke-width: 1;
}

/* Open Points view */
.op-quick {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.op-quick input {
  flex: 1;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  font-size: 13px;
  color: var(--text);
  outline: none;
}
.op-quick input:focus { border-color: var(--accent-2); }
/* Filter / sort bar above the open-points list */
.op-filterbar {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
  padding: 6px 8px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  align-items: center;
}
.op-filterbar input,
.op-filterbar select {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 5px 8px;
  font-size: 11.5px;
  color: var(--text);
  outline: none;
  height: 28px;
}
.op-filterbar input { min-width: 180px; flex: 1; }
.op-filterbar select { min-width: 110px; }
.op-filterbar input:focus,
.op-filterbar select:focus { border-color: var(--accent); }
.op-filterbar .ghost { font-size: 11.5px; padding: 4px 10px; height: 28px; }

/* Matrix view — 4×4 criticality (rows) × priority (cols) grid with
   packed bubbles per cell. Top-right cells (high+ × high+) tinted red
   so the danger quadrant pops. */
.op-list.op-view-matrix { display: block; }
.op-matrix {
  display: grid;
  grid-template-columns: 130px repeat(4, 1fr);
  grid-template-rows: 36px repeat(4, 130px);
  gap: 6px;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 12px;
}
.op-matrix-corner {
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: flex-start;
  gap: 4px;
  font-size: 10px;
  color: var(--text-faint);
  letter-spacing: .08em;
  text-transform: uppercase;
}
.op-matrix-axis-y { writing-mode: vertical-rl; transform: rotate(180deg); }
.op-matrix-col-head,
.op-matrix-row-head {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  border-radius: var(--radius-sm);
}
.op-matrix-col-head { padding: 4px; }
.op-matrix-row-head { padding: 4px 6px; text-align: center; }
.op-matrix-col-head.crit-low,
.op-matrix-row-head.crit-low      { color: var(--text-faint); }
.op-matrix-col-head.crit-med,
.op-matrix-row-head.crit-med      { color: var(--text-dim); }
.op-matrix-col-head.crit-high,
.op-matrix-row-head.crit-high     { color: #f5c150; }
.op-matrix-col-head.crit-critical,
.op-matrix-row-head.crit-critical { color: var(--bad); }
.op-matrix-cell {
  position: relative;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  overflow: hidden;
  display: flex;
  align-items: stretch;
  justify-content: stretch;
}
.op-matrix-cell.is-danger {
  background: rgba(248, 113, 113, .06);
  border-color: rgba(248, 113, 113, .25);
}
.op-matrix-cell-count {
  position: absolute;
  top: 4px; left: 6px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-faint);
  background: rgba(0, 0, 0, .25);
  padding: 1px 5px;
  border-radius: 999px;
  pointer-events: none;
  z-index: 1;
}
.op-matrix-cell-svg { width: 100%; height: 100%; display: block; }
.op-bubble {
  cursor: pointer;
  transition: filter .12s ease, stroke-width .12s ease;
}
.op-bubble:hover {
  filter: brightness(1.2);
  stroke-width: 2.5;
}

/* Bubbles view — single packed pile, importance-sized.
   Inner scroller pans the SVG when zoomed beyond the viewport. */
.op-list.op-view-bubbles { display: block; }
.op-bubbles-shell {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.op-bubbles-toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 4px;
}
.op-bubbles-toolbar .ghost { padding: 3px 10px; font-size: 12px; min-width: 30px; }
.op-bubbles-zoom-val {
  font-size: 11.5px;
  color: var(--text-dim);
  min-width: 48px;
  text-align: center;
}
.op-bubbles-scroll {
  /* Tall, scrollable viewport — the SVG renders at its natural pixel
     size (width/height attributes set by drawBubblesView from
     baseW × zoom) and scrolls within this box. Ctrl/⌘ + wheel
     toggles to zoom (handled in JS); plain wheel pans. */
  height: 72vh;
  min-height: 480px;
  overflow: auto;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
}
.op-bubbles-svg {
  display: block;
  /* width / height set inline by drawBubblesView */
}
.op-bubble-g { cursor: pointer; }
.op-bubble-lbl {
  fill: var(--text);
  font-weight: 600;
  pointer-events: none;
  letter-spacing: -.01em;
}
.op-leg-hint code { background: var(--bg-2); padding: 0 4px; border-radius: 3px; }

/* Tiny flash highlight when the user clicks a bubble and we jump to
   List view scrolled to the matching card. */
.op-item.op-flash {
  animation: op-flash 1.4s ease-out 1;
}
@keyframes op-flash {
  0%   { box-shadow: 0 0 0 0   rgba(110,168,255,.55); }
  20%  { box-shadow: 0 0 0 6px rgba(110,168,255,.45); }
  100% { box-shadow: 0 0 0 0   rgba(110,168,255,0); }
}

.op-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.op-item {
  display: grid;
  grid-template-columns: 22px 1fr auto;
  gap: 10px;
  padding: 10px 14px 10px 4px;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-left: 3px solid var(--accent-2);
  border-radius: var(--radius-sm);
  align-items: start;
  position: relative;
}
.op-row-grip {
  align-self: stretch;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  line-height: 1;
  letter-spacing: -2px;
  color: var(--text-faint);
  cursor: grab;
  user-select: none;
  opacity: .35;
  transition: opacity var(--transition), color var(--transition), background var(--transition);
  border-radius: 4px;
}
.op-item:hover .op-row-grip { opacity: .7; }
.op-row-grip:hover {
  opacity: 1 !important;
  color: var(--accent);
  background: var(--bg-3);
}
.op-item.dragging {
  background: var(--bg-3);
  outline: 1px solid var(--accent);
  outline-offset: -1px;
  opacity: .92;
}
body.is-op-dragging,
body.is-op-dragging .op-row-grip { cursor: grabbing !important; }
/* While dragging an open-point row, suppress every text selection so that
   sweeping the cursor over titles / contenteditable areas doesn't highlight
   text instead of moving the row. */
body.is-op-dragging,
body.is-op-dragging * { user-select: none !important; -webkit-user-select: none !important; }
.op-content { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.op-title {
  font-weight: 500;
  font-size: 13px;
  outline: none;
  border-radius: 2px;
}
.op-title:focus, .op-notes:focus { background: var(--bg-2); }
.op-context-wrap {
  border: 1px solid transparent;
  border-radius: 4px;
  transition: border-color var(--transition);
}
.op-context-wrap:focus-within {
  border-color: var(--line);
  background: var(--bg-2);
}
.op-toolbar {
  display: none;
  gap: 2px;
  padding: 4px 6px;
  border-bottom: 1px solid var(--line);
  background: var(--bg-1);
  align-items: center;
  border-top-left-radius: 4px;
  border-top-right-radius: 4px;
}
.op-context-wrap:focus-within .op-toolbar { display: flex; }
.op-toolbar button {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-dim);
  border-radius: 4px;
  padding: 2px 6px;
  font-size: 11px;
  cursor: pointer;
  min-width: 22px;
}
.op-toolbar button:hover { background: var(--bg-3); color: var(--text); }
.op-toolbar .sep { width: 1px; height: 14px; background: var(--line); margin: 0 3px; }
.op-toolbar .op-color {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px; height: 22px;
  cursor: pointer;
  border-radius: 4px;
  position: relative;
}
.op-toolbar .op-color::after {
  content: 'A';
  position: absolute;
  font-size: 11px;
  font-weight: 700;
  pointer-events: none;
  color: var(--text);
}
.op-toolbar .op-color input[type="color"] {
  width: 22px; height: 22px;
  border: 0;
  padding: 0;
  background: transparent;
  cursor: pointer;
  opacity: .25;
}
.op-toolbar .op-color:hover input[type="color"] { opacity: .5; }

.op-context {
  font-size: 11px;
  color: var(--text-dim);
  outline: none;
  min-height: 1.4em;
  border-radius: 2px;
  padding: 4px 6px;
  line-height: 1.4;
}
.op-context:empty::before {
  content: attr(data-placeholder);
  color: var(--text-faint);
  font-style: italic;
}
.op-context p { margin: 0 0 4px; }
.op-context ul, .op-context ol { padding-left: 18px; margin: 4px 0; }
.op-context li { margin-bottom: 2px; }
.op-context a { color: var(--accent); text-decoration: underline; }

/* Rich-text editor (used by change requests + reusable elsewhere) */
.op-context-wrap.rich-wrap {
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--bg-1);
}
.op-context-wrap.rich-wrap:focus-within {
  border-color: var(--accent);
  background: var(--bg-2);
}
.rich-toolbar {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 5px 6px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--line);
  border-top-left-radius: var(--radius-sm);
  border-top-right-radius: var(--radius-sm);
  flex-wrap: wrap;
}
.rt-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 4px;
  width: 26px;
  height: 26px;
  font-size: 13px;
  color: var(--text-dim);
  cursor: pointer;
  transition: background var(--transition), color var(--transition), border-color var(--transition);
  user-select: none;
  padding: 0;
}
.rt-btn:hover {
  background: var(--bg-3);
  color: var(--text);
  border-color: var(--line-2);
}
.rt-btn:active { background: var(--bg-1); }
.rt-bold   { font-weight: 800; }
.rt-ital   { font-style: italic; font-weight: 700; font-family: serif; }
.rt-und    { text-decoration: underline; font-weight: 700; }
.rt-strike { text-decoration: line-through; font-weight: 700; }
.rt-color {
  position: relative;
  cursor: pointer;
  flex-direction: column;
  gap: 0;
}
.rt-color-glyph {
  font-size: 13px;
  font-weight: 800;
  line-height: 13px;
  color: var(--text);
}
.rt-color-bar {
  width: 16px;
  height: 3px;
  border-radius: 1px;
  margin-top: 1px;
  background: var(--accent);
  display: block;
}
.rt-color input[type="color"] {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  cursor: pointer;
  border: 0;
  padding: 0;
  background: transparent;
}
.rt-sep {
  width: 1px;
  height: 16px;
  background: var(--line);
  margin: 0 4px;
  flex-shrink: 0;
}
.rich-body {
  font-size: 12px;
  color: var(--text);
  padding: 8px 10px;
  min-height: 60px;
  outline: none;
}
.rich-body:focus { background: transparent; }
.op-meta {
  font-size: 10px;
  color: var(--text-faint);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.op-origin {
  font-weight: 500;
  color: var(--text-dim);
  letter-spacing: .2px;
}
.op-title-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.op-crit-chip {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .4px;
  text-transform: uppercase;
  padding: 1px 6px;
  border-radius: 999px;
  flex-shrink: 0;
}
/* Click-to-edit chips on the open-point title row. The default-state
   chip uses a quieter style (transparent fill, dashed border) so the
   title row stays calm; chips light up only when carrying a non-default
   signal. cursor:pointer + a subtle lift on hover sells "tap me". */
.op-level-chip {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .4px;
  text-transform: uppercase;
  padding: 1px 8px;
  border-radius: 999px;
  flex-shrink: 0;
  cursor: pointer;
  font: inherit; /* normalize button defaults */
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .4px;
  text-transform: uppercase;
  line-height: 1.5;
  transition: transform var(--transition), filter var(--transition), box-shadow var(--transition);
}
.op-level-chip:hover {
  transform: translateY(-1px);
  filter: brightness(1.12);
  box-shadow: 0 2px 6px rgba(0,0,0,.18);
}
.op-level-chip.is-default { opacity: .7; }
.op-level-chip.is-default:hover { opacity: 1; }
.op-level-chip:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* Floating level picker (criticality / priority) */
.level-pop {
  position: fixed;
  z-index: 720;
  min-width: 180px;
  background: var(--bg-1);
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  box-shadow: 0 14px 36px rgba(0,0,0,.42);
  padding: 8px 6px;
}
.level-pop-head {
  padding: 2px 8px 6px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 4px;
}
.level-pop-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--text-dim);
}
.level-pop-sub {
  font-size: 11px;
  color: var(--text-faint);
  margin-top: 2px;
}
.level-pop-list {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.level-pop-item {
  display: flex; align-items: center; gap: 10px;
  width: 100%;
  padding: 6px 10px;
  background: transparent;
  border: 0;
  border-radius: 4px;
  color: var(--text);
  font-size: 12.5px;
  cursor: pointer;
  text-align: left;
}
.level-pop-item:hover { background: var(--bg-2); }
.level-pop-item.sel { background: var(--bg-2); }
.level-pop-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.level-pop-label { flex: 1; min-width: 0; }
.level-pop-check { color: var(--accent); font-weight: 700; }
/* --- Open-point resolution steps (checklist) --- */
.op-steps {
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px dashed var(--line);
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.op-steps-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.op-steps-lbl {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .6px;
  text-transform: uppercase;
  color: var(--text-faint);
}
.op-steps-progress {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-left: auto;
}
.op-steps-bar {
  width: 80px;
  height: 4px;
  background: var(--bg-3);
  border-radius: 999px;
  overflow: hidden;
  display: inline-block;
}
.op-steps-bar-fill {
  display: block;
  height: 100%;
  background: var(--accent);
  border-radius: 999px;
  transition: width var(--transition);
}
.op-steps.all-done .op-steps-bar-fill { background: var(--ok); }
.op-steps-count {
  font-size: 10.5px;
  font-weight: 600;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
  min-width: 30px;
  text-align: right;
}
.op-steps-list { display: flex; flex-direction: column; }
.op-step {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 3px 4px 3px 0;
  border-radius: 4px;
  position: relative;
  transition: background var(--transition);
}
.op-step:hover { background: var(--bg-2); }
.op-step.dragging {
  background: var(--bg-3);
  outline: 1px solid var(--accent);
  outline-offset: -1px;
  opacity: .9;
}
body.is-step-dragging,
body.is-step-dragging .op-step-grip { cursor: grabbing !important; }
.op-step-grip {
  width: 14px;
  flex-shrink: 0;
  font-size: 11px;
  color: var(--text-faint);
  cursor: grab;
  text-align: center;
  letter-spacing: -2px;
  opacity: 0;
  transition: opacity var(--transition);
  user-select: none;
}
.op-step:hover .op-step-grip { opacity: .55; }
.op-step-grip:hover { opacity: 1 !important; color: var(--text-dim); }
.op-step-check {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  background: transparent;
  border: 1.5px solid var(--line-2);
  border-radius: 4px;
  cursor: pointer;
  position: relative;
  padding: 0;
  transition: background var(--transition), border-color var(--transition);
}
.op-step-check:hover { border-color: var(--accent); }
.op-step-check.on {
  background: var(--accent);
  border-color: var(--accent);
}
.op-step-check.on::after {
  content: '';
  position: absolute;
  left: 4px;
  top: 1px;
  width: 4px;
  height: 8px;
  border: solid var(--bg-1);
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}
.op-step.done .op-step-check.on { background: var(--ok); border-color: var(--ok); }
.op-step-text {
  flex: 1;
  min-width: 0;
  font-size: 12px;
  color: var(--text);
  outline: none;
  padding: 2px 4px;
  border-radius: 3px;
  word-break: break-word;
}
.op-step-text:focus { background: var(--bg-3); color: var(--text); }
.op-step-text:empty::before {
  content: attr(data-placeholder);
  color: var(--text-faint);
  font-style: italic;
  pointer-events: none;
}
.op-step.done .op-step-text {
  color: var(--text-faint);
  text-decoration: line-through;
}
.op-step-del {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
  background: transparent;
  border: 0;
  color: var(--text-faint);
  font-size: 14px;
  cursor: pointer;
  border-radius: 4px;
  opacity: 0;
  transition: opacity var(--transition), background var(--transition), color var(--transition);
  padding: 0;
  line-height: 1;
}
.op-step:hover .op-step-del { opacity: .7; }
.op-step-del:hover { opacity: 1; color: var(--bad); background: rgba(248,113,133,.12); }
.op-step-add {
  align-self: flex-start;
  margin-top: 4px;
  background: transparent;
  border: 1px dashed var(--line-2);
  color: var(--text-faint);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 999px;
  cursor: pointer;
  transition: background var(--transition), color var(--transition), border-color var(--transition);
}
.op-step-add:hover {
  color: var(--accent);
  border-color: var(--accent);
  background: rgba(110,168,255,.08);
}
.op-meta-steps {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
}
.op-meta-steps.ok { color: var(--ok); }

.op-actions { display: flex; gap: 6px; align-items: flex-start; }
.op-promote { font-size: 11px; padding: 5px 10px; }
.op-discard {
  background: transparent;
  border: 0;
  color: var(--text-faint);
  font-size: 16px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
}
.op-discard:hover { color: var(--bad); background: rgba(248,113,113,.08); }

/* Cost-centre budgets */
.budget-card {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 14px;
}
.budget-head {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.budget-head h3 { margin: 0; font-size: 15px; font-family: ui-monospace, SFMono-Regular, monospace; }
/* Inline date-range pair — quiet styling so it doesn't compete with
   the cost-centre title or the budget legend. */
.budget-range {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--text-faint);
}
.budget-range input[type="date"] {
  background: transparent;
  border: 1px solid transparent;
  border-radius: 4px;
  padding: 2px 4px;
  font-size: 11px;
  color: var(--text-dim);
  font-family: ui-monospace, SFMono-Regular, monospace;
  cursor: pointer;
  color-scheme: dark;
}
.budget-range input[type="date"]:hover { border-color: var(--line); background: var(--bg-2); }
.budget-range input[type="date"]:focus { border-color: var(--accent-2); background: var(--bg-2); color: var(--text); outline: none; }
.budget-range .bc-range-sep { color: var(--text-faint); }
.budget-comps { display: flex; flex-wrap: wrap; gap: 6px; }
.budget-kpis {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(86px, 1fr));
  gap: 6px;
  margin-bottom: 10px;
}
.bk {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 5px 8px;
  cursor: help;
  transition: border-color var(--transition);
}
.bk:hover { border-color: var(--accent-2); }
.evm-tooltip {
  position: fixed;
  display: none;
  z-index: 300;
  max-width: 320px;
  background: var(--bg-1);
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  box-shadow: var(--shadow);
  font-size: 12px;
  line-height: 1.45;
  pointer-events: none;
}
.evm-name {
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}
.evm-formula {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 6px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--line);
}
.evm-formula code {
  font-family: ui-monospace, SFMono-Regular, monospace;
  background: var(--bg-3);
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 11px;
  color: var(--accent);
}
.evm-lbl {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--text-faint);
  font-weight: 600;
}
.evm-desc { color: var(--text-dim); }
.bk-l { font-size: 9px; color: var(--text-faint); text-transform: uppercase; letter-spacing: .1em; }
.bk-v { font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; }
.bk-v.ok { color: var(--ok); }
.bk-v.bad { color: var(--bad); }

.budget-chart-wrap {
  position: relative;
  /* Each chart scrolls horizontally on its own — wide datasets keep a
     comfortable per-week column density (drawChart computes the SVG
     width dynamically) instead of being squished to fit the panel. */
  overflow-x: auto;
}
/* SVG width is set inline by drawChart (matches the viewBox so the
   chart never gets distorted). Height stays fixed at 240px. */
.budget-chart { height: 240px; display: block; user-select: none; }
.b-actual { fill: rgba(110,168,255,.55); }
.b-actual.past   { fill: rgba(110,168,255,.7); }
.b-actual.future { fill: rgba(110,168,255,.3); }
.b-comp-area { transition: opacity var(--transition); }
.b-comp-area:hover { opacity: 0.85; }
.b-budget-line { fill: none; stroke: var(--bad); stroke-width: 2; stroke-dasharray: 4 3; }
.b-hover-line { stroke: var(--text); stroke-width: 1; opacity: .55; pointer-events: none; }
.b-point {
  fill: var(--bad);
  stroke: var(--bg-1);
  stroke-width: 1.5;
  cursor: ns-resize;
  transition: r 80ms ease;
}
.b-point:hover { r: 6; }
.b-today { stroke: var(--accent); stroke-width: 1; stroke-dasharray: 3 2; opacity: .7; }
.b-today-lbl { fill: var(--accent); font-size: 10px; }

.budget-edit {
  position: fixed;
  display: none;
  z-index: 250;
  width: 110px;
  padding: 5px 8px;
  font-size: 13px;
  font-weight: 600;
  font-family: ui-monospace, SFMono-Regular, monospace;
  text-align: right;
  background: var(--bg-1);
  color: var(--ok);
  border: 2px solid var(--ok);
  border-radius: 6px;
  box-shadow: var(--shadow);
  outline: none;
}
.budget-edit:focus {
  border-color: var(--accent-2);
  color: var(--text);
}

/* Hover panel that explains the data under the cursor */
.b-hover-panel {
  position: fixed;
  display: none;
  z-index: 200;
  background: var(--bg-1);
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow);
  padding: 8px 10px;
  font-size: 11px;
  line-height: 1.4;
  min-width: 200px;
  max-width: 280px;
  pointer-events: none;
}
.b-h-head {
  font-weight: 600;
  color: var(--text);
  border-bottom: 1px solid var(--line);
  padding-bottom: 4px;
  margin-bottom: 5px;
}
.b-h-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 1px 0;
  color: var(--text-dim);
}
.b-h-row b { color: var(--text); font-weight: 500; flex: 1; }
.b-h-dot {
  width: 9px; height: 9px;
  border-radius: 2px;
  flex-shrink: 0;
}
.b-h-dot-budget {
  background: var(--bad);
  border: 1px dashed var(--bad);
}
.b-h-val { font-variant-numeric: tabular-nums; font-weight: 600; }
.b-h-val.ok { color: var(--ok); }
.b-h-val.bad { color: var(--bad); }
.b-h-tot {
  border-top: 1px solid var(--line);
  margin-top: 4px;
  padding-top: 4px;
}
.b-h-delta {
  margin-top: 4px;
  font-size: 10px;
  font-style: italic;
  text-align: right;
}
.b-h-delta.ok { color: var(--ok); }
.b-h-delta.bad { color: var(--bad); }
.b-h-empty { color: var(--text-faint); font-style: italic; }
.b-tick { fill: var(--text-faint); font-size: 10px; }
.b-ytick line { stroke: var(--text-faint); stroke-width: 1; }
.b-ytick text { fill: var(--text-faint); font-size: 10px; font-variant-numeric: tabular-nums; }
/* Minor vertical gridlines marking each month boundary. Quiet stroke
   so they help the eye line up the month labels at the axis without
   competing with the actuals area or the budget line. */
.b-month-grid {
  stroke: var(--line);
  stroke-width: 1;
  stroke-dasharray: 2 4;
  opacity: .55;
  pointer-events: none;
}

/* Cost centre input on components page */
.row .component-cc {
  width: 130px;
  font-family: ui-monospace, SFMono-Regular, monospace;
  font-size: 11px;
}
.kpi-stack {
  display: flex;
  height: 14px;
  border-radius: 4px;
  overflow: hidden;
  background: var(--bg-3);
  margin-top: 2px;
}
.kpi-stack .seg { transition: opacity var(--transition); min-width: 1px; }
.kpi-stack .seg:hover { opacity: .8; }
.cmp-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 4px 10px;
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 4px;
}
.cmp-leg-item { display: inline-flex; align-items: center; gap: 4px; }
.cmp-leg-item .dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 2px;
}
.cmp-leg-item b { color: var(--text); font-weight: 600; }

.register {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
}
.reg-head, .reg-row {
  display: grid;
  /* checkbox · Title · Component · Owner · Status · Priority · Due · Predicted · Originator · delete */
  grid-template-columns: 28px 2.2fr 1fr 1.1fr 1.1fr .85fr .9fr .9fr .9fr 36px;
  align-items: stretch;
}
.reg-col-check {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}
.reg-col-check input[type="checkbox"] {
  width: 14px; height: 14px;
  margin: 0;
  cursor: pointer;
  accent-color: var(--accent);
}
.reg-cell.reg-cell-check {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}
.reg-cell.reg-cell-check input[type="checkbox"] {
  width: 14px; height: 14px;
  margin: 0;
  cursor: pointer;
  accent-color: var(--accent);
}
.reg-row.is-selected {
  background: rgba(110,168,255,.06);
  box-shadow: inset 3px 0 0 var(--accent);
}
.reg-row.is-selected:hover { background: rgba(110,168,255,.10); }

/* Sticky bulk-action toolbar — appears at the bottom-center of the
   Register when one or more rows are selected. Same horizontal anchor
   as the toast but more spacious. */
.bulk-bar {
  position: fixed;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-3);
  border: 1px solid var(--accent);
  border-radius: 999px;
  padding: 6px 10px 6px 14px;
  box-shadow: 0 6px 22px rgba(0,0,0,.35), 0 0 0 1px rgba(110,168,255,.1);
  z-index: 180;
  font-size: 12px;
  max-width: calc(100vw - 40px);
  flex-wrap: wrap;
  justify-content: center;
}
.bulk-bar[hidden] { display: none; }
.bulk-bar-count {
  font-weight: 700;
  color: var(--accent);
  padding-right: 4px;
}
.bulk-bar-divider {
  width: 1px;
  align-self: stretch;
  background: var(--line-2);
}
.bulk-bar-select {
  background: var(--bg-1);
  border: 1px solid var(--line);
  color: var(--text);
  border-radius: var(--radius-sm);
  padding: 3px 6px;
  font-size: 11.5px;
  cursor: pointer;
}
.bulk-bar-select:hover { border-color: var(--accent); }
.bulk-bar .ghost {
  padding: 4px 10px;
  font-size: 11.5px;
}
.reg-cell.priority-cell {
  display: flex;
  align-items: center;
  gap: 6px;
  padding-left: 8px;
}
.reg-prio-pip {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.reg-inp.derived {
  color: var(--text-faint);
  font-style: italic;
}
.reg-inp.overridden {
  color: var(--accent);
  font-weight: 600;
}
.reg-head {
  background: var(--bg-2);
  border-bottom: 1px solid var(--line);
}
.reg-col {
  background: transparent;
  border: 0;
  text-align: left;
  padding: 9px 12px;
  color: var(--text-faint);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .08em;
  cursor: pointer;
  position: relative;
}
.reg-col:hover { color: var(--text); }
.reg-col.asc,
.reg-col.desc { color: var(--text); }
.reg-col.asc::after  { content: ' ↑'; color: var(--accent); }
.reg-col.desc::after { content: ' ↓'; color: var(--accent); }
/* Multi-column sort: when there's more than one sort column, each
   sorted header gets a small priority badge ("1", "2", "3"…) in its
   top-right corner so the user can see the sort hierarchy at a glance.
   Single-column sort omits the badge — it adds noise. */
.reg-col[data-sort-priority]::before {
  content: attr(data-sort-priority);
  position: absolute;
  top: 2px;
  right: 4px;
  background: var(--accent);
  color: var(--bg-1);
  font-size: 8.5px;
  font-weight: 800;
  width: 12px;
  height: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  letter-spacing: 0;
}
.reg-col-spacer { padding: 9px 6px; }
.reg-body {
  max-height: calc(100vh - 320px);
  overflow-y: auto;
}
.reg-row {
  padding: 0;
  border-bottom: 1px solid var(--line);
  /* Background tint is now driven by status (see below) — overdue /
     blocked rows get a red fill that catches the eye, done / cancelled
     fade. The default starts transparent so todo rows stay clean. */
  background: transparent;
  transition: background var(--transition);
}
.reg-row:hover { background: var(--bg-2); }
.reg-row:last-child { border-bottom: 0; }
.reg-cell {
  padding: 4px 8px;
  font-size: 12px;
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 6px;
}
.reg-cell.muted { color: var(--text-faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.reg-cell.status-cell { gap: 6px; }

.reg-inp {
  width: 100%;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 4px;
  padding: 4px 6px;
  color: var(--text);
  font: inherit;
  font-size: 12px;
  outline: none;
  min-width: 0;
}
.reg-inp:hover { border-color: var(--line); background: var(--bg-2); }
.reg-inp:focus {
  border-color: var(--accent-2);
  background: var(--bg-2);
}
.reg-inp.title-inp { font-weight: 500; }
.reg-inp.late { color: var(--bad); }
.reg-inp.soon { color: var(--warn); }
.reg-inp.commit-inp { text-align: right; padding-right: 6px; }
.reg-inp.reg-comp { font-weight: 600; }

select.reg-inp {
  appearance: none;
  background-image: linear-gradient(45deg, transparent 50%, var(--text-faint) 50%), linear-gradient(135deg, var(--text-faint) 50%, transparent 50%);
  background-position: calc(100% - 11px) 50%, calc(100% - 6px) 50%;
  background-size: 5px 5px, 5px 5px;
  background-repeat: no-repeat;
  padding-right: 18px;
}
input[type="date"].reg-inp {
  font-variant-numeric: tabular-nums;
}

.row-del {
  background: transparent;
  border: 0;
  color: var(--text-faint);
  font-size: 18px;
  line-height: 1;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  transition: color var(--transition), background var(--transition);
}
.row-del:hover { color: var(--bad); background: rgba(248,113,113,.08); }

/* Register row LEFT EDGE — encodes COMPONENT (allocation). The 3 px
   strip uses --comp-rgb when the action has a component assigned;
   otherwise stays a neutral subtle grey so unassigned actions read
   as "neutral" rather than mis-coloured. */
.reg-row {
  box-shadow: inset 3px 0 0 rgba(148, 163, 184, .35);
}
.reg-row[style*="--comp-rgb"] {
  box-shadow: inset 3px 0 0 rgb(var(--comp-rgb));
}

/* Row BACKGROUND — encodes STATUS so the user can scan for trouble.
   Overdue + blocked get a red wash that's impossible to miss; in-
   progress gets a faint blue cue; done fades to a quiet green; todo
   stays clean. Selected rows still win (handled below). */
.reg-row.is-overdue            { background: rgba(248, 113, 113, .12); }
.reg-row.is-overdue:hover      { background: rgba(248, 113, 113, .18); }
.reg-row.status-blocked:not(.is-overdue) {
  background: rgba(248, 113, 113, .07);
}
.reg-row.status-blocked:not(.is-overdue):hover { background: rgba(248, 113, 113, .12); }
.reg-row.status-doing:not(.is-overdue) {
  background: rgba(110, 168, 255, .04);
}
.reg-row.status-doing:not(.is-overdue):hover { background: rgba(110, 168, 255, .09); }

/* Done / cancelled — mirror the board's "past tense" treatment.
   Background fades to a quiet tone, the row dims, the title gets
   struck through. Hover restores legibility. */
.reg-row.is-done {
  background: rgba(74, 222, 128, .05);
  opacity: .68;
}
.reg-row.is-done .title-inp {
  text-decoration: line-through;
  text-decoration-color: rgba(255,255,255,.4);
  text-decoration-thickness: 1.5px;
}
.reg-row.is-done:hover { opacity: 1; background: rgba(74, 222, 128, .10); }
.reg-row.is-cancelled {
  background: rgba(148, 163, 184, .06);
  opacity: .55;
}
.reg-row.is-cancelled .title-inp {
  text-decoration: line-through;
  text-decoration-color: rgba(255,255,255,.4);
  text-decoration-thickness: 1.5px;
}
.reg-row.is-cancelled:hover { opacity: .85; }

/* Lateness 'drag tail' — a small horizontal trail whose length scales
   with days late. Length encodes magnitude, the +Nd label gives the
   precise read. Capped at 30 days of width so a 90-day-late item
   doesn't elbow the title cell. A small ⏰ icon anchors the left end
   so the metaphor reads at first glance even before scanning the
   number — the gradient then 'drags' rightward to the +Nd label. */
.reg-late-tail {
  --bad-rgb: 248, 113, 121;
  display: inline-flex;
  align-items: center;
  flex-shrink: 0;
  height: 16px;
  width: calc(40px + var(--days, 0) * 1.4px);
  margin-left: 6px;
  padding: 0 6px 0 4px;
  gap: 4px;
  border-left: 2px solid rgb(var(--bad-rgb));
  border-radius: 0 8px 8px 0;
  background: linear-gradient(
    to right,
    rgba(var(--bad-rgb), .28) 0%,
    rgba(var(--bad-rgb), .10) 60%,
    rgba(var(--bad-rgb), 0)  100%
  );
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .02em;
  color: rgb(var(--bad-rgb));
  font-variant-numeric: tabular-nums;
  cursor: default;
  transition: filter var(--transition);
}
.reg-late-icon {
  font-size: 10px;
  line-height: 1;
  flex-shrink: 0;
  filter: hue-rotate(-8deg) saturate(1.25);
}
.reg-late-num {
  margin-left: auto;
}
.reg-row:hover .reg-late-tail { filter: brightness(1.15); }

/* Risks & Opportunities styling */
.ro-row { display: grid; grid-template-columns: 22px 1.6fr auto auto; align-items: center; gap: 12px; }
.ro-icon { font-size: 16px; line-height: 1; text-align: center; }
.ro-row.kind-risk .ro-icon { color: var(--bad); }
.ro-row.kind-opportunity .ro-icon { color: var(--ok); }
.ro-title { font-weight: 500; }
.ro-score { font-variant-numeric: tabular-nums; color: var(--text-dim); font-size: 11px; }
.ro-score b {
  display: inline-block;
  min-width: 24px;
  text-align: center;
  padding: 0 6px;
  border-radius: 4px;
  margin-left: 4px;
  font-size: 11px;
  background: var(--bg-3);
}
.ro-row.kind-risk.sev-high .ro-score b { background: rgba(248,113,113,.2); color: #fecaca; }
.ro-row.kind-risk.sev-mid  .ro-score b { background: rgba(251,191,36,.2); color: #fde68a; }
.ro-row.kind-opportunity.sev-high .ro-score b { background: rgba(74,222,128,.2); color: #c8f7d9; }
.ro-row.kind-opportunity.sev-mid  .ro-score b { background: rgba(125,211,252,.2); color: #cfe1ff; }

.ro-row.kind-risk { border-left: 3px solid rgba(248,113,113,.55); }
.ro-row.kind-opportunity { border-left: 3px solid rgba(74,222,128,.55); }
.ro-pre { color: var(--text-faint); text-decoration: line-through; margin-right: 4px; }
.ro-arrow { color: var(--text-faint); margin-right: 4px; }
.ro-link { color: var(--accent); cursor: pointer; font-size: 11px; }
.ro-link:hover { text-decoration: underline; }

/* Risk × Probability matrix */
.mtx-svg { width: 100%; max-width: 600px; display: block; }
.mtx-cell { stroke: var(--bg-1); stroke-width: 1; }
.mtx-low     { fill: rgba(74,222,128,.18); }
.mtx-mid     { fill: rgba(251,191,36,.20); }
.mtx-high    { fill: rgba(248,113,113,.22); }
.mtx-extreme { fill: rgba(248,113,113,.40); }
.mtx-cell-num { fill: var(--text-faint); font-size: 10px; opacity: .7; }
.mtx-tick { fill: var(--text-dim); font-size: 11px; font-weight: 600; }
.mtx-axis-lbl { fill: var(--text-faint); font-size: 11px; font-style: italic; }

.mtx-pt { cursor: pointer; transition: transform 80ms ease, stroke-width 80ms ease; transform-box: fill-box; transform-origin: center; }
.mtx-pt:hover { transform: scale(1.35); }
.mtx-pt-inh.risk        { fill: none; stroke: rgba(248,113,113,.95); stroke-width: 2; }
.mtx-pt-inh.opp         { fill: none; stroke: rgba(74,222,128,.95);  stroke-width: 2; }
.mtx-pt-res.risk        { fill: rgba(248,113,113,.95); stroke: var(--bg-1); stroke-width: 1.5; }
.mtx-pt-res.opp         { fill: rgba(74,222,128,.95);  stroke: var(--bg-1); stroke-width: 1.5; }
.mtx-arrow.risk { stroke: rgba(248,113,113,.6); stroke-width: 1.4; }
.mtx-arrow.opp  { stroke: rgba(74,222,128,.6);  stroke-width: 1.4; }

.mtx-legend {
  display: flex; flex-wrap: wrap; gap: 14px;
  margin-top: 10px;
  font-size: 11px;
  color: var(--text-dim);
  align-items: center;
}
.mtx-legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 5px; vertical-align: middle; }
.mtx-legend .dot.mtx-low     { background: rgba(74,222,128,.5); }
.mtx-legend .dot.mtx-mid     { background: rgba(251,191,36,.5); }
.mtx-legend .dot.mtx-high    { background: rgba(248,113,113,.5); }
.mtx-legend .dot.mtx-extreme { background: rgba(248,113,113,.85); }
.mtx-legend .sep { width: 1px; height: 14px; background: var(--line); }
.mtx-legend svg { vertical-align: middle; margin-right: 4px; }

/* Matrix point hover tooltip */
.mtx-tooltip {
  position: fixed;
  display: none;
  z-index: 300;
  max-width: 340px;
  background: var(--bg-1);
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  box-shadow: var(--shadow);
  font-size: 12px;
  line-height: 1.5;
  pointer-events: none;
}
.mtx-tip-head {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--line);
}
.mtx-tip-icon { font-size: 16px; line-height: 1; }
.mtx-tip-icon.risk { color: var(--bad); }
.mtx-tip-icon.opp  { color: var(--ok); }
.mtx-tip-title { font-weight: 600; flex: 1; color: var(--text); }
.mtx-tip-stage {
  font-size: 9px; text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--text-faint);
  background: var(--bg-3);
  padding: 1px 6px;
  border-radius: 3px;
}
.mtx-tip-row {
  display: flex; align-items: center; gap: 8px;
  padding: 1px 0;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
}
.mtx-tip-lbl {
  font-size: 9px; text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--text-faint);
  width: 70px;
  flex-shrink: 0;
}
.mtx-tip-row b { color: var(--text); font-weight: 600; }
.mtx-tip-mit {
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--line);
  color: var(--text-dim);
  white-space: pre-wrap;
  font-size: 11px;
}
.mtx-tip-mit .mtx-tip-lbl { display: block; margin-bottom: 2px; }
.mtx-tip-link {
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--line);
  font-size: 11px;
  color: var(--accent);
}
.ro-row .row-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; max-width: 320px; }
.ro-resp {
  font-size: 11px;
  color: var(--text-faint);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 320px;
}
.ro-owner { font-size: 11px; color: var(--text-dim); }

/* --- Auto-backup popup (anchored to the sidebar foot button) --- */
.ab-panel {
  position: fixed;
  bottom: 60px;
  left: 12px;
  z-index: 950;
  width: 320px;
  background: var(--bg-1);
  border: 1px solid var(--line-2);
  border-radius: var(--radius);
  box-shadow: 0 12px 36px rgba(0,0,0,.5);
  overflow: hidden;
}
.ab-panel[hidden] { display: none; }
.ab-head {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--line);
}
.ab-title {
  flex: 1;
  font-weight: 700;
  font-size: 13px;
  color: var(--text);
  letter-spacing: -.01em;
}
.ab-body { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.ab-row {
  display: flex; align-items: center; gap: 10px;
  font-size: 12px;
  flex-wrap: wrap;
}
.ab-lbl {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--text-faint);
  min-width: 70px;
}
.ab-val {
  flex: 1;
  min-width: 0;
  font-size: 12px;
  color: var(--text-dim);
  word-break: break-word;
}
.ab-muted { color: var(--text-faint); font-style: italic; }
.ab-row select {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 4px 8px;
  font-size: 12px;
  color: var(--text);
  outline: none;
}
.ab-row select:focus { border-color: var(--accent); }
.ab-row .ghost { font-size: 11.5px; padding: 4px 10px; }
.ab-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; font-size: 12px; color: var(--text-dim); }
.ab-toggle input[type="checkbox"] { accent-color: var(--accent); width: 14px; height: 14px; }
.ab-status .ab-val { font-variant-numeric: tabular-nums; }
.ab-actions {
  display: flex; gap: 8px;
  padding-top: 8px;
  border-top: 1px dashed var(--line);
  flex-wrap: wrap;
}
.ab-actions button { flex: 1; min-width: 0; }
.ab-warn {
  background: rgba(251,191,36,.10);
  border: 1px solid rgba(251,191,36,.3);
  color: #f5c150;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  font-size: 11.5px;
  line-height: 1.45;
}

/* --- Floating personal to-do widget --- */
.todo-fab {
  position: fixed;
  /* Sits above the storage status pill so the FAB is the higher,
     more prominent of the two bottom-right fixtures. */
  bottom: 56px;
  right: 18px;
  z-index: 900;
  width: 46px;
  height: 46px;
  border-radius: 50%;
  border: 1px solid var(--line-2);
  background: var(--bg-2);
  color: var(--text-faint);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 6px 20px rgba(0,0,0,.35);
  transition: background var(--transition), color var(--transition), border-color var(--transition), transform .15s ease;
}
.todo-fab:hover { transform: translateY(-2px); }
.todo-fab.empty { color: var(--text-faint); border-color: var(--line); }
.todo-fab.has-open {
  background: var(--accent-2);
  color: white;
  border-color: var(--accent);
}
.todo-fab.all-done {
  background: var(--ok);
  color: var(--bg-1);
  border-color: var(--ok);
}
.todo-fab .todo-fab-icon { font-weight: 800; line-height: 1; }
.todo-fab-badge {
  position: absolute;
  top: -4px; right: -4px;
  min-width: 18px; height: 18px;
  background: var(--bad);
  color: white;
  border-radius: 999px;
  font-size: 10.5px;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 5px;
  box-shadow: 0 2px 6px rgba(0,0,0,.4);
}
/* Re-assert display:none over the higher-specificity rule above so the
   `hidden` attribute actually hides the badge when there are no open todos. */
.todo-fab-badge[hidden] { display: none; }
.todo-panel {
  position: fixed;
  bottom: 76px;
  right: 18px;
  z-index: 900;
  width: 320px;
  max-height: min(60vh, 500px);
  background: var(--bg-1);
  border: 1px solid var(--line-2);
  border-radius: var(--radius);
  box-shadow: 0 12px 36px rgba(0,0,0,.5);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.todo-panel[hidden] { display: none; }
.todo-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  background: var(--bg-2);
}
.todo-title {
  font-weight: 700;
  font-size: 13px;
  color: var(--text);
  letter-spacing: -.01em;
}
.todo-meta {
  font-size: 11px;
  color: var(--text-faint);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.todo-head .icon-btn { margin-left: auto; }
.todo-add {
  display: flex;
  gap: 6px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
}
.todo-add input {
  flex: 1;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 6px 9px;
  color: var(--text);
  font-size: 12px;
  outline: none;
}
.todo-add input:focus { border-color: var(--accent); }
.todo-add button { padding: 4px 10px; font-size: 13px; line-height: 1; }
.todo-list {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 6px 6px 10px;
}
.todo-empty {
  font-size: 11.5px;
  color: var(--text-faint);
  font-style: italic;
  padding: 18px 12px;
  text-align: center;
}
.todo-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 6px;
  border-radius: 4px;
  transition: background var(--transition);
  position: relative;
}
.todo-item:hover { background: var(--bg-2); }
.todo-item.dragging {
  background: var(--bg-3);
  outline: 1px solid var(--accent);
  outline-offset: -1px;
  opacity: .9;
}
body.is-todo-dragging,
body.is-todo-dragging .todo-grip { cursor: grabbing !important; }
.todo-grip {
  width: 14px;
  flex-shrink: 0;
  font-size: 11px;
  color: var(--text-faint);
  cursor: grab;
  text-align: center;
  letter-spacing: -2px;
  opacity: 0;
  transition: opacity var(--transition);
  user-select: none;
}
.todo-item:hover .todo-grip { opacity: .55; }
.todo-grip:hover { opacity: 1 !important; color: var(--text-dim); }
.todo-check {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  background: transparent;
  border: 1.5px solid var(--line-2);
  border-radius: 4px;
  cursor: pointer;
  position: relative;
  padding: 0;
  transition: background var(--transition), border-color var(--transition);
}
.todo-check:hover { border-color: var(--accent); }
.todo-check.on { background: var(--accent); border-color: var(--accent); }
.todo-check.on::after {
  content: '';
  position: absolute;
  left: 4px; top: 1px;
  width: 4px; height: 8px;
  border: solid var(--bg-1);
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}
.todo-item.done .todo-check.on { background: var(--ok); border-color: var(--ok); }
.todo-text {
  flex: 1;
  min-width: 0;
  font-size: 12px;
  color: var(--text);
  outline: none;
  padding: 2px 4px;
  border-radius: 3px;
  word-break: break-word;
}
.todo-text:focus { background: var(--bg-3); }
.todo-text:empty::before {
  content: attr(data-placeholder);
  color: var(--text-faint);
  font-style: italic;
}
.todo-item.done .todo-text {
  color: var(--text-faint);
  text-decoration: line-through;
}
.todo-del {
  width: 20px; height: 20px;
  flex-shrink: 0;
  background: transparent;
  border: 0;
  color: var(--text-faint);
  font-size: 14px;
  cursor: pointer;
  border-radius: 4px;
  opacity: 0;
  transition: opacity var(--transition), background var(--transition), color var(--transition);
  padding: 0;
  line-height: 1;
}
.todo-item:hover .todo-del { opacity: .7; }
.todo-del:hover { opacity: 1; color: var(--bad); background: rgba(248,113,133,.12); }

.chart-panel .panel-title { display: flex; align-items: center; gap: 8px; }

/* Change requests page */
.cr-kpis {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px;
  margin-bottom: 14px;
}
.cr-kpi {
  background: linear-gradient(135deg, var(--bg-2) 0%, var(--bg-1) 100%);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  position: relative;
  overflow: hidden;
}
.cr-kpi::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(800px 80px at 0% 0%, rgba(110,168,255,.06), transparent 60%);
  pointer-events: none;
}
.cr-kpi-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--text-faint);
}
.cr-kpi-num {
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.1;
}
.cr-kpi-num.ok  { color: var(--ok); }
.cr-kpi-num.bad { color: var(--bad); }
.cr-kpi-sub {
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 6px;
}
.cr-kpi-pip {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.cr-kpi-bar {
  height: 4px;
  background: var(--bg-3);
  border-radius: 999px;
  overflow: hidden;
  margin-top: 6px;
}
.cr-kpi-bar-fill {
  height: 100%;
  border-radius: 999px;
  transition: width var(--transition);
  background: var(--accent);
}
.cr-kpi-bar-fill.ok   { background: var(--ok); }
.cr-kpi-bar-fill.warn { background: var(--warn); }
.cr-kpi-bar-fill.bad  { background: var(--bad); }
.cr-kpi-mix {
  flex-direction: row;
  align-items: center;
  gap: 12px;
  grid-column: span 2;
}
.cr-kpi-mix .cr-kpi-donut { flex-shrink: 0; }
.cr-kpi-mix-list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px 14px;
  flex: 1;
  min-width: 0;
  font-size: 11px;
}
.cr-kpi-mix-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 1px 4px;
  border-radius: 3px;
  transition: background var(--transition), opacity var(--transition);
}
.cr-kpi-mix-row.clickable { cursor: pointer; }
.cr-kpi-mix-row.clickable:hover { background: var(--bg-3); }
.cr-kpi-mix-row.active { background: var(--bg-3); outline: 1px solid var(--line-2); }
.cr-kpi-mix-row.dimmed { opacity: .42; }
.cr-kpi-mix-lbl { color: var(--text-dim); flex: 1; min-width: 0; }
.cr-kpi-mix-n   { color: var(--text); font-weight: 600; }
/* Donut slice click + hover affordance */
.cr-donut-slice {
  cursor: pointer;
  transition: opacity var(--transition), stroke-width var(--transition);
}
.cr-donut-slice:hover { stroke-width: 12; }
.cr-donut-slice.dimmed { opacity: .35; }
.cr-donut-slice.active { stroke-width: 12; }

.cr-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.cr-card {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: border-color var(--transition);
}
.cr-card:hover { border-color: var(--line-2); }
.cr-row1 {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.cr-status {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .4px;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 999px;
  flex-shrink: 0;
}
.cr-title {
  font-weight: 600;
  font-size: 13px;
  color: var(--text);
  flex: 1;
  min-width: 0;
}
.cr-rationale,
.cr-analysis {
  color: var(--text-dim);
  font-size: 12px;
  line-height: 1.4;
  display: flex;
  gap: 8px;
  align-items: flex-start;
}
.cr-section-lbl {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: .6px;
  text-transform: uppercase;
  color: var(--text-faint);
  flex-shrink: 0;
  padding-top: 1px;
  min-width: 60px;
}
.cr-rich {
  flex: 1;
  min-width: 0;
}
.cr-rich p { margin: 0 0 4px; }
.cr-rich ul, .cr-rich ol { padding-left: 18px; margin: 4px 0; }
.cr-rich li { margin-bottom: 2px; }
.cr-rich a { color: var(--accent); text-decoration: underline; }
.cr-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  font-size: 11px;
  color: var(--text-faint);
  align-items: center;
}
.cr-meta-item { display: inline-flex; align-items: center; gap: 4px; }
.cr-meta-item.ok { color: var(--ok); }
.cr-meta-item.bad { color: var(--bad); }
.cr-decision { color: var(--text-dim); font-weight: 500; }
.cr-link {
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
}
.cr-link:hover { text-decoration: underline; }

/* Links page */
.links-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 10px;
}
.link-card {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  display: flex; flex-direction: column; gap: 4px;
  font-size: 12px;
  transition: border-color var(--transition), background var(--transition);
}
.link-card:hover { border-color: var(--line-2); background: var(--bg-3); }
.link-title {
  color: var(--accent);
  font-weight: 600;
  text-decoration: none;
  font-size: 13px;
  word-break: break-word;
}
.link-title:hover { text-decoration: underline; }
.link-host {
  color: var(--text-faint);
  font-size: 11px;
  word-break: break-all;
}
.link-desc {
  color: var(--text-dim);
  font-size: 11.5px;
  margin-top: 2px;
  white-space: pre-wrap;
}
.link-comp {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--text-dim);
  font-size: 11px;
  margin-top: 4px;
}
.link-comp-swatch {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
}

/* Folder-organized link tree */
.link-tree {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.link-folder {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color var(--transition), background var(--transition);
}
.link-folder.drop-target {
  border-color: var(--accent);
  background: rgba(110,168,255,.06);
}
.link-folder.dragging { opacity: .65; outline: 1px dashed var(--accent); }
.folder-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--line);
  user-select: none;
}
.folder-head .row-grip {
  width: 18px;
  font-size: 13px;
  letter-spacing: -2px;
  text-align: center;
  color: var(--text-faint);
  cursor: grab;
  opacity: .35;
  transition: opacity var(--transition), color var(--transition);
}
.link-folder:hover .folder-head .row-grip { opacity: .7; }
.folder-head .row-grip:hover { opacity: 1; color: var(--accent); }
.folder-caret {
  background: transparent;
  border: 0;
  color: var(--text-dim);
  font-size: 12px;
  padding: 0 2px;
  cursor: pointer;
  width: 18px;
  text-align: center;
}
.folder-caret:hover { color: var(--text); }
.folder-caret-spacer { width: 18px; display: inline-block; }
.folder-name {
  flex: 1;
  min-width: 0;
  font-weight: 600;
  font-size: 13px;
  color: var(--text);
  outline: none;
  padding: 2px 4px;
  border-radius: 3px;
}
.folder-name:focus { background: var(--bg-3); }
.folder-name:empty::before { content: attr(data-placeholder); color: var(--text-faint); font-style: italic; }
.folder-name.loose-name { color: var(--text-dim); font-style: italic; cursor: default; }
.folder-count {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-faint);
  background: var(--bg-3);
  padding: 1px 7px;
  border-radius: 999px;
  font-variant-numeric: tabular-nums;
}
.folder-add,
.folder-del {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-faint);
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 4px;
  cursor: pointer;
  transition: background var(--transition), color var(--transition), border-color var(--transition);
}
.folder-add:hover { color: var(--accent); border-color: var(--accent); background: rgba(110,168,255,.08); }
.folder-del { font-size: 14px; padding: 1px 8px; }
.folder-del:hover { color: var(--bad); background: rgba(248,113,133,.12); border-color: var(--bad); }
.folder-body {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 10px;
  padding: 10px 12px;
  min-height: 56px;
  transition: background var(--transition);
}
.link-folder.collapsed .folder-body { display: none; }
.folder-empty {
  grid-column: 1 / -1;
  font-size: 11.5px;
  color: var(--text-faint);
  font-style: italic;
  padding: 12px 6px;
  text-align: center;
  border: 1px dashed var(--line);
  border-radius: var(--radius-sm);
  transition: border-color var(--transition), color var(--transition), background var(--transition);
}
.folder-empty.drop-target {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(110,168,255,.08);
}
.link-folder.loose .folder-head { background: transparent; border-bottom: 1px dashed var(--line); }
.link-folder.loose { background: transparent; border-style: dashed; }

/* Link card drag visuals */
.link-card { position: relative; }
.link-card .row-grip {
  position: absolute;
  left: 4px; top: 8px;
  width: 14px;
  font-size: 12px;
  color: var(--text-faint);
  cursor: grab;
  opacity: .3;
  letter-spacing: -2px;
  user-select: none;
  transition: opacity var(--transition), color var(--transition);
}
.link-card:hover .row-grip { opacity: .8; }
.link-card .row-grip:hover { opacity: 1; color: var(--accent); }
.link-card.dragging {
  opacity: .55;
  outline: 1px dashed var(--accent);
}
.link-card.drop-before {
  box-shadow: 0 -2px 0 0 var(--accent) inset;
  border-top: 2px solid var(--accent);
}
.link-card.drop-after {
  box-shadow: 0 2px 0 0 var(--accent) inset;
  border-bottom: 2px solid var(--accent);
}
/* Title leaves room for the grip when one is rendered */
.link-card:has(.link-grip) .link-title { padding-left: 14px; }
body.is-link-dragging,
body.is-folder-dragging,
body.is-link-dragging *,
body.is-folder-dragging * {
  user-select: none !important;
  -webkit-user-select: none !important;
}
body.is-link-dragging,
body.is-folder-dragging,
body.is-link-dragging .link-grip,
body.is-folder-dragging .folder-grip { cursor: grabbing !important; }

/* Row swatch — colour-tracks rows with their timeline marker */
.row-swatch {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
  box-shadow: 0 0 0 1.5px var(--bg-1);
  flex-shrink: 0;
}

/* Legend */
.ytick line { stroke: var(--text-faint); stroke-width: 1; }
.ytick text { fill: var(--text-faint); font-size: 9px; }

.chart-legend {
  display: flex; flex-wrap: wrap; gap: 10px;
  margin-top: 6px;
  font-size: 11px;
  color: var(--text-dim);
}

.small-multiples {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 10px;
}
.sm-cell {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
}
.sm-head {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 4px;
  font-size: 12px;
}
.sm-head b { flex: 1; }
.sm-peak { font-size: 10px; }
.sm-peak.ok { color: var(--ok); }
.sm-peak.warn { color: var(--warn); }
.sm-peak.over { color: var(--bad); }
.sm-cell .spark { height: 56px; }

@media (max-width: 1100px) {
  .charts-grid { grid-template-columns: 1fr; }
  .chart-panel.half { grid-column: span 1; }
}

/* Legend */
.legend {
  font-weight: normal;
  font-size: 11px;
  display: inline-flex; gap: 12px;
  color: var(--text-faint);
}
.legend-item { display: inline-flex; align-items: center; gap: 5px; }
.legend-item .dot {
  display: inline-block;
  width: 9px; height: 9px; border-radius: 2px;
}
.legend-item .dot.ok { background: var(--ok); }
.legend-item .dot.warn { background: var(--warn); }
.legend-item .dot.bad { background: var(--bad); }
.bar-track {
  height: 8px;
  background: var(--bg-3);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}
.bar-fill { height: 100%; background: var(--accent); border-radius: 4px; }
.bar-fill.over { background: var(--bad); }
.bar-fill.warn { background: var(--warn); }
.bar-fill.ok { background: var(--ok); }
.bar-val { text-align: right; color: var(--text-dim); font-variant-numeric: tabular-nums; }

.crit-list { display: flex; flex-direction: column; gap: 6px; }
.crit-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  font-size: 12px;
}
.crit-item .dot {
  width: 8px; height: 8px; border-radius: 50%;
}
.crit-item .meta { margin-left: auto; color: var(--text-dim); font-size: 11px; }

/* Review mode */
.review {
  max-width: 880px;
  margin: 0 auto;
  display: flex; flex-direction: column; gap: 14px;
  padding-top: 6px;
}
.review-stepper {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.review-step {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 5px 12px;
  font-size: 11px;
  color: var(--text-dim);
}
.review-step.active {
  background: var(--accent-2); color: white; border-color: var(--accent-2);
}
.review-step.done {
  background: var(--bg-3); color: var(--text); border-color: var(--line-2);
}
.review-card {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px 20px;
}
.review-card h2 { margin: 0 0 10px; font-size: 16px; font-weight: 600; }
.review-foot { display: flex; justify-content: space-between; align-items: center; gap: 6px; }

/* Lists */
.row-list { display: flex; flex-direction: column; gap: 6px; }
.row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  font-size: 12px;
}
.row.late { border-left: 3px solid var(--bad); }
.row.soon { border-left: 3px solid var(--warn); }
.row .row-meta { margin-left: auto; color: var(--text-dim); font-size: 11px; display: flex; gap: 10px; align-items: center; }
.row select.inline, .row input.inline {
  background: var(--bg-3); border: 1px solid var(--line); border-radius: 4px;
  padding: 2px 6px; font-size: 11px;
}
.row .clickable { cursor: pointer; }
.row .clickable:hover { color: var(--accent); }

/* Quick add */
.overlay {
  position: fixed; inset: 0;
  background: rgba(8,10,16,.6);
  backdrop-filter: blur(2px);
  z-index: 100;
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 80px;
}
.overlay[hidden] { display: none; }
.qa-panel {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  width: 600px;
  max-width: 92vw;
  box-shadow: var(--shadow);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.qa-tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--line);
  background: var(--bg-2);
  overflow-x: auto;
}
.qa-tab {
  background: transparent;
  border: 0; border-bottom: 2px solid transparent;
  padding: 10px 14px;
  color: var(--text-dim);
  white-space: nowrap;
}
.qa-tab.active { color: var(--text); border-bottom-color: var(--accent); }
.qa-body { padding: 16px; display: grid; gap: 10px; }
.qa-body label { font-size: 11px; color: var(--text-dim); }
.qa-body input, .qa-body select, .qa-body textarea {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  outline: none;
}
.qa-body input:focus, .qa-body select:focus, .qa-body textarea:focus {
  border-color: var(--accent-2);
}
.qa-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.qa-foot {
  display: flex; justify-content: space-between; align-items: center; gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid var(--line);
  background: var(--bg-2);
}
.hint { color: var(--text-faint); font-size: 11px; }
kbd {
  background: var(--bg-3);
  border: 1px solid var(--line-2);
  border-bottom-width: 2px;
  border-radius: 4px;
  padding: 1px 5px;
  font-size: 10px;
  font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
}

/* Drawer */
.drawer-overlay { justify-content: flex-end; padding: 0; align-items: stretch; }
.drawer {
  background: var(--bg-1);
  border-left: 1px solid var(--line);
  width: 460px; max-width: 96vw;
  display: flex; flex-direction: column;
  box-shadow: var(--shadow);
}
.drawer-head {
  display: flex; align-items: center;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
}
.drawer-title { font-weight: 600; flex: 1; font-size: 14px; }
.drawer-body { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
.field { display: grid; gap: 4px; }
.field label { font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: .1em; }
.field input, .field select, .field textarea {
  background: var(--bg-2); border: 1px solid var(--line);
  border-radius: var(--radius-sm); padding: 7px 10px; outline: none;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent-2); }
.field input.field-err, .field select.field-err, .field textarea.field-err {
  border-color: var(--bad);
  box-shadow: 0 0 0 2px rgba(248,113,133,.15);
}
.field input.field-err::placeholder { color: rgba(248,113,133,.7); }
.field textarea { resize: vertical; min-height: 70px; font-family: inherit; }

.history { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--text-dim); }
.history-item { padding: 4px 0; border-top: 1px dashed var(--line); }

/* Notes panel */
.notes-panel {
  grid-area: notes;
  background: var(--bg-1);
  border-left: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
  position: relative;
}
.notes-panel[hidden] { display: none; }

/* Drag handle on the panel's left edge — invisible at rest, accent strip on hover/drag */
.notes-resize {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 6px;
  cursor: ew-resize;
  z-index: 5;
  background: transparent;
  transition: background var(--transition);
}
.notes-resize:hover,
.notes-resize.dragging {
  background: linear-gradient(to right, transparent, rgba(110,168,255,.55));
}
body.is-notes-resizing,
body.is-notes-resizing * { cursor: ew-resize !important; user-select: none !important; }

/* Generic drag-to-reorder grip + dragging state for any list row */
.row-grip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 14px;
  flex-shrink: 0;
  font-size: 12px;
  color: var(--text-faint);
  letter-spacing: -2px;
  cursor: grab;
  opacity: 0;
  user-select: none;
  transition: opacity var(--transition);
  margin-right: 4px;
}
.row:hover > .row-grip,
.person-row:hover > .row-grip,
.kpi:hover > .row-grip,
.reg-row:hover > .row-grip,
.cr-card:hover > .row-grip,
.link-card:hover > .row-grip,
.ro-row:hover > .row-grip {
  opacity: .55;
}
.row-grip:hover { opacity: 1 !important; color: var(--text-dim); }
.row.dragging,
.person-row.dragging,
.kpi.dragging,
.reg-row.dragging,
.cr-card.dragging,
.link-card.dragging,
.ro-row.dragging {
  background: var(--bg-3);
  outline: 1px solid var(--accent);
  outline-offset: -1px;
  opacity: .92;
}
body.is-row-dragging,
body.is-row-dragging .row-grip { cursor: grabbing !important; }
body.is-row-dragging *        { user-select: none !important; }
.notes-head {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  background: var(--bg-2);
}
.notes-title { font-weight: 600; font-size: 13px; }
.notes-meta { color: var(--text-faint); font-size: 11px; flex: 1; }
.notes-toolbar {
  display: flex; gap: 4px; align-items: center;
  padding: 6px 10px;
  border-bottom: 1px solid var(--line);
  background: var(--bg-1);
  flex-wrap: wrap;
}
.notes-toolbar .sep {
  width: 1px; height: 18px; background: var(--line); margin: 0 4px;
}
.notes-toolbar button {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-dim);
  border-radius: 4px;
  padding: 3px 8px;
  font-size: 12px;
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
}
.notes-toolbar button:hover { background: var(--bg-3); color: var(--text); }
.notes-toolbar button b, .notes-toolbar button i, .notes-toolbar button u {
  font-style: inherit;
}
.notes-toolbar .notes-action-btn {
  margin-left: auto;
  background: var(--accent-2);
  color: white;
  font-weight: 600;
}
.notes-toolbar .notes-action-btn:hover { background: var(--accent); color: white; }
/* Compact H1–H5 group — distinct from word-style buttons */
.notes-toolbar button.nt-h {
  padding: 3px 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .02em;
  font-variant-numeric: tabular-nums;
  min-width: 26px;
}
/* Font-colour picker — "A" glyph above a coloured underline */
.notes-toolbar .nt-color {
  position: relative;
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  padding: 0;
  border-radius: 4px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: background var(--transition), border-color var(--transition);
}
.notes-toolbar .nt-color:hover { background: var(--bg-3); border-color: var(--line-2); }
.notes-toolbar .nt-color-glyph {
  font-size: 12px;
  font-weight: 800;
  line-height: 13px;
  color: var(--text);
  pointer-events: none;
}
.notes-toolbar .nt-color-bar {
  display: block;
  width: 16px;
  height: 3px;
  border-radius: 1px;
  margin-top: 1px;
  background: var(--accent);
  pointer-events: none;
}
.notes-toolbar .nt-color input[type="color"] {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
  padding: 0;
  background: transparent;
  cursor: pointer;
  opacity: 0;
}
.notes-body {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px;
  outline: none;
  font-size: 13px;
  line-height: 1.55;
  color: var(--text);
}
.notes-body:focus { outline: none; }
.notes-body p { margin: 0 0 10px; }
/* Five distinct heading levels for meeting notes — each visually clearer than
   the next. H1 carries an underline accent so titles stand out. */
.notes-body h1 {
  font-size: 18px; line-height: 1.25;
  margin: 18px 0 8px;
  color: var(--text);
  font-weight: 800;
  letter-spacing: -.01em;
  border-bottom: 1px solid var(--line-2);
  padding-bottom: 4px;
}
.notes-body h2 {
  font-size: 16px; line-height: 1.3;
  margin: 16px 0 6px;
  color: var(--text);
  font-weight: 700;
}
.notes-body h3 {
  font-size: 14.5px; line-height: 1.35;
  margin: 14px 0 5px;
  color: var(--text);
  font-weight: 700;
}
.notes-body h4 {
  font-size: 13.5px;
  margin: 12px 0 4px;
  color: var(--text-dim);
  font-weight: 700;
}
.notes-body h5 {
  font-size: 12.5px;
  margin: 10px 0 4px;
  color: var(--text-faint);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
}
.notes-body h6 {
  font-size: 12px;
  margin: 10px 0 4px;
  color: var(--text-faint);
  font-weight: 600;
  font-style: italic;
}
.notes-body ul, .notes-body ol { padding-left: 22px; margin: 6px 0 10px; }
.notes-body li { margin-bottom: 3px; }
.notes-body i, .notes-body em { font-style: italic; color: var(--text-dim); }
/* Subtle pulse when a TOC link scrolls a heading into view */
.notes-body .nt-flash {
  animation: nt-flash 0.9s ease-out;
}
@keyframes nt-flash {
  0%   { background: rgba(110,168,255,.0);  border-radius: 4px; }
  20%  { background: rgba(110,168,255,.22); }
  100% { background: rgba(110,168,255,.0);  }
}

/* Auto-built table of contents — sits above the editable body */
.notes-toc {
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  background: var(--bg-2);
  padding: 8px 14px 10px;
  max-height: 30vh;
  overflow-y: auto;
}
.notes-toc[hidden] { display: none; }
.notes-toc-head {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 4px;
}
.notes-toc-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.notes-toc-item {
  margin: 0;
  font-size: 11.5px;
  line-height: 1.4;
}
.notes-toc-item a {
  display: block;
  padding: 2px 4px;
  color: var(--text-dim);
  text-decoration: none;
  border-left: 2px solid transparent;
  border-radius: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color var(--transition), background var(--transition), border-color var(--transition);
}
.notes-toc-item a:hover {
  color: var(--accent);
  background: var(--bg-3);
  border-left-color: var(--accent);
}
.notes-toc-item.lvl-1 a { color: var(--text); font-weight: 600; padding-left: 6px; }
.notes-toc-item.lvl-2 a { padding-left: 16px; }
.notes-toc-item.lvl-3 a { padding-left: 26px; }
.notes-toc-item.lvl-4 a { padding-left: 36px; font-size: 11px; }
.notes-toc-item.lvl-5 a,
.notes-toc-item.lvl-6 a { padding-left: 46px; font-size: 10.5px; color: var(--text-faint); }

.note-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(110,168,255,.15);
  border: 1px solid rgba(110,168,255,.45);
  color: var(--text);
  padding: 1px 6px 1px 5px;
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
  user-select: none;
  vertical-align: baseline;
  line-height: 1.3;
  transition: background var(--transition);
}
.note-chip:hover { background: rgba(110,168,255,.25); }
.note-chip .chip-mark { font-size: 11px; }
.note-chip b { font-weight: 600; }
.note-chip .chip-meta { color: var(--text-faint); font-weight: normal; font-size: 10px; }
.note-chip.done { background: rgba(74,222,128,.15); border-color: rgba(74,222,128,.45); }
.note-chip.done .chip-mark { color: var(--ok); }
.note-chip.done b { text-decoration: line-through; opacity: .7; }
.note-chip.person-chip {
  background: rgba(167,139,250,.15);
  border-color: rgba(167,139,250,.45);
}
.note-chip.person-chip:hover { background: rgba(167,139,250,.28); }
.note-chip.person-chip .chip-mark { color: rgba(167,139,250,1); font-weight: 700; }

/* Inline @/# autocomplete popup for the meeting notes */
.notes-ac {
  position: fixed;
  z-index: 1000;
  background: var(--bg-1);
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  box-shadow: 0 8px 24px rgba(0,0,0,.45);
  padding: 4px;
  min-width: 220px;
  max-width: 320px;
  max-height: 280px;
  overflow-y: auto;
}
.notes-ac[hidden] { display: none; }
.notes-ac .ac-item {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  background: transparent;
  border: 0;
  border-radius: 4px;
  padding: 6px 8px;
  text-align: left;
  cursor: pointer;
  color: var(--text);
  font-size: 12px;
}
.notes-ac .ac-item:hover,
.notes-ac .ac-item.active {
  background: var(--bg-3);
}
.notes-ac .ac-item .avatar,
.notes-ac .ac-item .ac-icon {
  flex-shrink: 0;
  width: 22px; height: 22px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  border-radius: 50%;
  background: var(--bg-2);
  color: var(--text-dim);
  font-weight: 700;
}
.notes-ac .ac-text {
  display: flex;
  flex-direction: column;
  min-width: 0;
  flex: 1;
}
.notes-ac .ac-name {
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.notes-ac .ac-meta {
  font-size: 10.5px;
  color: var(--text-faint);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.note-chip.blocked { background: rgba(248,113,113,.15); border-color: rgba(248,113,113,.45); }
.note-chip.blocked .chip-mark { color: var(--bad); }
.note-chip.chip-stale {
  background: var(--bg-3);
  border-color: var(--line);
  color: var(--text-faint);
}

.notes-foot {
  padding: 6px 12px;
  border-top: 1px solid var(--line);
  font-size: 10px;
  color: var(--text-faint);
  display: flex;
  gap: 12px;
  align-items: center;
  justify-content: space-between;
}
#notesSaved.saving { color: var(--warn); }

/* Action description editor */
.desc-overlay {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 80px;
}
.desc-modal {
  width: 640px;
  max-width: 92vw;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.desc-head {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  background: var(--bg-2);
}
.desc-title { font-weight: 600; font-size: 13px; flex: 1; }
.desc-toolbar { padding: 6px 10px; border-bottom: 1px solid var(--line); }
.desc-body {
  min-height: 220px;
  max-height: 60vh;
  overflow-y: auto;
  padding: 14px 16px;
  font-size: 13px;
  line-height: 1.55;
  outline: none;
}
.desc-body p { margin: 0 0 10px; }
.desc-body h3 { font-size: 14px; margin: 14px 0 6px; }
.desc-body ul, .desc-body ol { padding-left: 22px; margin: 6px 0 10px; }
.desc-foot {
  display: flex; gap: 8px; align-items: center;
  padding: 10px 14px;
  border-top: 1px solid var(--line);
  background: var(--bg-2);
}
.desc-foot .desc-clear { margin-left: auto; color: var(--bad); }

/* Hover tooltip showing rich description */
.action-desc-tooltip {
  position: fixed;
  display: none;
  background: var(--bg-1);
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow);
  padding: 10px 14px;
  max-width: 360px;
  font-size: 12px;
  line-height: 1.5;
  color: var(--text);
  pointer-events: none;
  z-index: 300;
}
.action-desc-tooltip p { margin: 0 0 6px; }
.action-desc-tooltip p:last-child { margin-bottom: 0; }
.action-desc-tooltip h3 { font-size: 13px; margin: 6px 0 4px; }
.action-desc-tooltip ul, .action-desc-tooltip ol { padding-left: 20px; margin: 4px 0 6px; }
.action-desc-tooltip li { margin-bottom: 2px; }
.action-desc-tooltip .hover-desc + .hover-note { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--line); }
.action-desc-tooltip .hover-note {
  font-size: 11px;
  color: var(--text-dim);
  white-space: pre-wrap;
}
.action-desc-tooltip .hover-note-lbl {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-right: 6px;
}

/* Gantt — overflow title shown to the right of bars too narrow to legibly fit */
.tl-bar-overflow {
  position: absolute;
  top: 9px;
  height: 18px;
  line-height: 18px;
  font-size: 11px;
