<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cockpit — Project Tracker</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Dashboard-gauge motif: dial track + active arc + needle + pivot. -->
            <path d="M 12 41 A 20 20 0 0 1 52 41" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" fill="none" opacity=".4"/>
            <path d="M 12 41 A 20 20 0 0 1 47 26" stroke="currentColor" stroke-width="6"   stroke-linecap="round" fill="none"/>
            <line x1="32" y1="41" x2="44" y2="30" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
            <circle cx="32" cy="41" r="3.5" fill="currentColor"/>
          </svg>
        </div>
        <div class="brand-name">Cockpit</div>
      </div>

      <nav class="nav">
        <button class="nav-section nav-section-toggle" data-group="workspace" aria-expanded="true">Workspace<span class="nav-section-caret">▾</span></button>
        <div class="nav-group" data-group-body="workspace">
          <button class="nav-item" data-view="portfolio">
            <span class="nav-icon">▦</span><span>Portfolio</span>
          </button>
          <button class="nav-item" data-view="people">
            <span class="nav-icon">◔</span><span>People</span>
          </button>
        </div>

        <button class="nav-section nav-section-toggle" data-group="work" aria-expanded="true">Work<span class="nav-section-caret">▾</span></button>
        <div class="nav-group" data-group-body="work">
        <button class="nav-item" data-view="board">
          <span class="nav-icon">▤</span><span>Board</span>
        </button>
        <button class="nav-item" data-view="register">
          <span class="nav-icon">≣</span><span>Register</span>
        </button>
        <button class="nav-item" data-view="openpoints">
          <span class="nav-icon">⚐</span><span>Open points</span>
        </button>
        <button class="nav-item" data-view="timeline">
          <span class="nav-icon">▬</span><span>Gantt</span>
        </button>
        <button class="nav-item" data-view="calendar">
          <span class="nav-icon">▦</span><span>Calendar</span>
        </button>
        <button class="nav-item" data-view="links">
          <span class="nav-icon">↗</span><span>Links</span>
        </button>
        </div>

        <button class="nav-section nav-section-toggle" data-group="insight" aria-expanded="true">Insight<span class="nav-section-caret">▾</span></button>
        <div class="nav-group" data-group-body="insight">
        <button class="nav-item" data-view="dashboard">
          <span class="nav-icon">◰</span><span>Dashboard</span>
        </button>
        <button class="nav-item" data-view="review">
          <span class="nav-icon">▶</span><span>Review</span>
        </button>
        <button class="nav-item" data-view="risks">
          <span class="nav-icon">△</span><span>Risks &amp; Opps</span>
        </button>
        <button class="nav-item" data-view="decisions">
          <span class="nav-icon">⬡</span><span>Decisions</span>
        </button>
        <button class="nav-item" data-view="changes">
          <span class="nav-icon">⇆</span><span>Change requests</span>
        </button>
        <button class="nav-item" data-view="components">
          <span class="nav-icon">▣</span><span>Components</span>
        </button>
        <button class="nav-item" data-view="budgets">
          <span class="nav-icon">€</span><span>Budgets</span>
        </button>
        </div>
      </nav>

      <div class="sidebar-foot">
        <button class="icon-btn" id="btnImport" title="Import JSON — replace or merge with current data">↓</button>
        <button class="icon-btn" id="btnExport" title="Export JSON — save current state to a file">↑</button>
        <button class="icon-btn" id="btnAutoBackup" title="Auto-backup — pick a folder + frequency">⟳</button>
        <button class="icon-btn danger" id="btnEmpty" title="Start from zero — wipe everything">⊘</button>
        <button class="icon-btn" id="btnReset" title="Reset to sample data">↺</button>
        <button class="icon-btn" id="btnTheme" title="Toggle light / dark">◐</button>
      </div>
      <div id="autoBackupPanel" class="ab-panel" hidden></div>
    </aside>

    <header class="topbar">
      <button class="icon-btn" id="btnSidebarToggle" title="Toggle sidebar">≡</button>

      <div class="project-picker">
        <select id="projectSelect" aria-label="Project"></select>
        <button class="icon-btn" id="btnNewProject" title="New project">+</button>
      </div>

      <div class="search">
        <input id="search" type="search" placeholder="Search actions, owners, tags…" />
      </div>

      <div class="filters" id="filters">
        <select id="filterOwner"><option value="">All owners</option></select>
        <select id="filterComponent"><option value="">All components</option></select>
        <select id="filterStatus">
          <option value="">All status</option>
          <option value="todo">Not started</option>
          <option value="doing">In progress</option>
          <option value="blocked">Blocked</option>
          <option value="done">Done</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <select id="filterDue">
          <option value="">All dates</option>
          <option value="late">Late</option>
          <option value="week">This week</option>
          <option value="month">This month</option>
        </select>
      </div>

      <div class="topbar-actions">
        <button class="icon-btn" id="btnUndo" title="Undo (Cmd/Ctrl+Z)">↶</button>
        <button class="icon-btn" id="btnRedo" title="Redo (Cmd/Ctrl+Shift+Z)">↷</button>
        <button class="icon-btn" id="btnNotesToggle" title="Toggle meeting notes (Cmd/Ctrl+\\)">✎</button>
        <button class="icon-btn icon-btn-bell" id="btnInbox" title="Inbox — items needing your attention">
          <span aria-hidden="true">⚑</span>
          <span class="bell-badge" id="bellBadge" hidden></span>
        </button>
        <button class="icon-btn" id="btnHelp" title="Keyboard shortcuts (?)">?</button>
        <button class="primary" id="btnQuickAdd" title="Open command palette (Cmd/Ctrl+K)">+ Quick add</button>
      </div>
    </header>

    <main class="main" id="main">
      <!-- views are injected dynamically -->
    </main>

    <aside class="notes-panel" id="notesPanel" hidden>
      <div class="notes-resize" id="notesResize" title="Drag to resize · double-click to reset" aria-label="Resize notes panel" role="separator"></div>
      <div class="notes-head">
        <div class="notes-title">Meeting notes</div>
        <div class="notes-meta" id="notesMeta"></div>
        <button class="icon-btn" id="btnNotesClose" title="Close">×</button>
      </div>
      <div class="notes-toolbar">
        <button data-cmd="bold" title="Bold (Cmd/Ctrl+B)"><b>B</b></button>
        <button data-cmd="italic" title="Italic (Cmd/Ctrl+I)"><i>I</i></button>
        <button data-cmd="underline" title="Underline (Cmd/Ctrl+U)"><u>U</u></button>
        <span class="sep"></span>
        <button data-cmd="formatBlock" data-arg="<h1>" title="Heading 1" class="nt-h">H1</button>
        <button data-cmd="formatBlock" data-arg="<h2>" title="Heading 2" class="nt-h">H2</button>
        <button data-cmd="formatBlock" data-arg="<h3>" title="Heading 3" class="nt-h">H3</button>
        <button data-cmd="formatBlock" data-arg="<h4>" title="Heading 4" class="nt-h">H4</button>
        <button data-cmd="formatBlock" data-arg="<h5>" title="Heading 5" class="nt-h">H5</button>
        <button data-cmd="formatBlock" data-arg="<p>" title="Paragraph">¶</button>
        <button data-cmd="insertUnorderedList" title="Bullet list">• list</button>
        <button data-cmd="insertOrderedList" title="Numbered list">1.</button>
        <span class="sep"></span>
        <label class="nt-color" title="Text colour">
          <span class="nt-color-glyph">A</span>
          <span class="nt-color-bar" id="ntColorBar"></span>
          <input type="color" id="ntColorInput" value="#6ea8ff" />
        </label>
        <button data-cmd="removeFormat" title="Clear formatting">✕</button>
        <span class="sep"></span>
        <button id="btnNotesAction" class="notes-action-btn" title="Insert action (Cmd/Ctrl+Shift+A)">+ action</button>
      </div>
      <nav class="notes-toc" id="notesToc" aria-label="Notes contents" hidden></nav>
      <div class="notes-body" id="notesBody" contenteditable="true" spellcheck="true"></div>
      <div class="notes-foot">
        <span id="notesSaved">Saved</span>
        <span class="hint"><kbd>@</kbd> person · <kbd>#</kbd> action · <kbd>Cmd/Ctrl+Shift+A</kbd> new action</span>
      </div>
      <div class="notes-ac" id="notesAutocomplete" hidden role="listbox"></div>
    </aside>

    <div class="toast" id="toast" hidden></div>
  </div>

  <!-- Quick add overlay -->
  <div class="overlay" id="quickAdd" hidden>
    <div class="qa-panel">
      <div class="qa-tabs">
        <button class="qa-tab active" data-qa="action">Action</button>
        <button class="qa-tab" data-qa="deliverable">Deliverable</button>
        <button class="qa-tab" data-qa="milestone">Milestone</button>
        <button class="qa-tab" data-qa="risk">Risk / Opportunity</button>
        <button class="qa-tab" data-qa="decision">Decision</button>
        <button class="qa-tab" data-qa="change">Change request</button>
        <button class="qa-tab" data-qa="meeting">Meeting</button>
        <button class="qa-tab" data-qa="link">Link</button>
        <button class="qa-tab" data-qa="component">Component</button>
        <button class="qa-tab" data-qa="person">Person</button>
        <button class="qa-tab" data-qa="project">Project</button>
      </div>
      <div class="qa-body" id="qaBody"></div>
      <div class="qa-foot">
        <span class="hint">Tip: <kbd>Tab</kbd> to move • <kbd>Enter</kbd> to save • <kbd>Esc</kbd> to close</span>
        <div>
          <button class="ghost" id="qaCancel">Cancel</button>
          <button class="primary" id="qaSave">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail drawer -->
  <div class="overlay drawer-overlay" id="drawer" hidden>
    <div class="drawer">
      <div class="drawer-head">
        <div class="drawer-title" id="drawerTitle">Details</div>
        <button class="icon-btn" id="drawerClose">×</button>
      </div>
      <div class="drawer-body" id="drawerBody"></div>
    </div>
  </div>

  <!-- Universal Cmd+K palette (Phase C) -->
  <div class="overlay palette-overlay" id="paletteOverlay" hidden>
    <div class="palette" role="dialog" aria-label="Command palette">
      <div class="palette-input-row">
        <span class="palette-glyph" aria-hidden="true">⌕</span>
        <input id="paletteInput" type="text" placeholder="Search anything · type / for commands" autocomplete="off" />
        <button class="icon-btn" id="paletteClose" title="Close (Esc)">×</button>
      </div>
      <div class="palette-results" id="paletteResults" role="listbox"></div>
      <div class="palette-foot">
        <span><kbd>↑↓</kbd> navigate</span>
        <span><kbd>Enter</kbd> open</span>
        <span><kbd>Esc</kbd> close</span>
      </div>
    </div>
  </div>

  <!-- Keyboard cheatsheet modal (Phase B) -->
  <div class="overlay desc-overlay" id="helpOverlay" hidden>
    <div class="desc-modal" style="width:520px;">
      <div class="desc-head">
        <div class="desc-title">Keyboard &amp; mouse shortcuts</div>
        <button class="icon-btn" id="helpClose" title="Close">×</button>
      </div>
      <div class="help-body" id="helpBody"></div>
      <div class="desc-foot">
        <span class="hint" style="margin-right:auto; color:var(--text-faint); font-size:11px;">Tip: open this any time with <kbd>?</kbd></span>
        <button class="primary" id="helpDone">Got it</button>
      </div>
    </div>
  </div>

  <!-- Floating personal to-do — project-independent quick list -->
  <button id="todoFab" class="todo-fab" type="button" title="My to-do list" aria-label="Open to-do list">
    <span class="todo-fab-icon" aria-hidden="true">✓</span>
    <span class="todo-fab-badge" id="todoFabBadge" hidden></span>
  </button>
  <div id="todoPanel" class="todo-panel" hidden>
    <div class="todo-head">
      <span class="todo-title">My to-do</span>
      <span class="todo-meta" id="todoMeta"></span>
      <button class="icon-btn" id="todoClose" title="Close" aria-label="Close">×</button>
    </div>
    <div class="todo-add">
      <input id="todoInput" type="text" placeholder="Add a personal to-do…" />
      <button class="ghost" id="todoAdd" type="button" title="Add">+</button>
    </div>
    <div class="todo-list" id="todoList"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
