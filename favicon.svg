<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cockpitBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#4d8bff"/>
      <stop offset="100%" stop-color="#8b6fde"/>
    </linearGradient>
    <linearGradient id="cockpitHl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity=".18"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Squircle background + subtle top highlight for depth -->
  <rect width="64" height="64" rx="14" fill="url(#cockpitBg)"/>
  <rect width="64" height="64" rx="14" fill="url(#cockpitHl)"/>

  <!-- Dial track (full half-circle, faint) -->
  <path d="M 12 41 A 20 20 0 0 1 52 41"
        stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"
        fill="none" opacity=".35"/>
  <!-- Active gauge arc (~77% filled) -->
  <path d="M 12 41 A 20 20 0 0 1 47 26"
        stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Needle, pointing along the active arc -->
  <line x1="32" y1="41" x2="44" y2="30"
        stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Pivot dot -->
  <circle cx="32" cy="41" r="3.5" fill="#ffffff"/>
</svg>
